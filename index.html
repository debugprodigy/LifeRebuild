<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<link rel="manifest" href="./manifest.json"/>
<link rel="icon" type="image/png" sizes="192x192" href="./assets/icons/icon-192.png">
<link rel="apple-touch-icon" href="./assets/icons/apple-touch-icon.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>LifeRebuild</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --bg2: #111118;
  --bg3: #1a1a24;
  --card: #16161f;
  --card2: #1e1e2a;
  --border: #2a2a3a;
  --gold: #f5c518;
  --gold2: #e6b800;
  --green: #22c55e;
  --red: #ef4444;
  --amber: #f59e0b;
  --blue: #3b82f6;
  --text: #f0f0f8;
  --text2: #a0a0b8;
  --text3: #606078;
  --radius: 14px;
  --transition: 0.18s cubic-bezier(.4,0,.2,1);
}
.light {
  --bg: #f4f4f8;
  --bg2: #ebebf2;
  --bg3: #e0e0ea;
  --card: #ffffff;
  --card2: #f8f8fc;
  --border: #d8d8e8;
  --text: #111118;
  --text2: #555568;
  --text3: #9090a8;
}
.amoled {
  --bg: #000000;
  --bg2: #000000;
  --bg3: #0a0a0a;
  --card: #0d0d0d;
  --card2: #111111;
  --border: #1a1a1a;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;}
#app{height:100%;display:flex;flex-direction:column;max-width:520px;margin:0 auto;position:relative;overflow:hidden;}

/* SCREENS */
.screen{position:absolute;top:0;left:0;right:0;bottom:0;overflow-y:auto;overflow-x:hidden;padding-bottom:80px;display:none;}
.screen.active{display:block;}
.screen::-webkit-scrollbar{display:none;}
.slide-out-left{animation:slideOutLeft .18s ease forwards;}
.slide-out-right{animation:slideOutRight .18s ease forwards;}
.slide-in-right{animation:slideInRight .18s ease forwards;}
.slide-in-left{animation:slideInLeft .18s ease forwards;}
@keyframes slideOutLeft{to{transform:translateX(-30%);opacity:0}}
@keyframes slideOutRight{to{transform:translateX(30%);opacity:0}}
@keyframes slideInRight{from{transform:translateX(30%);opacity:0}}
@keyframes slideInLeft{from{transform:translateX(-30%);opacity:0}}

/* BOTTOM NAV */
#nav{position:absolute;bottom:0;left:0;right:0;height:68px;background:var(--bg2);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;z-index:100;padding-bottom:env(safe-area-inset-bottom,0);}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--text3);cursor:pointer;padding:8px 12px;border-radius:10px;transition:var(--transition);min-width:52px;}
.nav-btn.active{color:var(--gold);}
.nav-btn svg{width:22px;height:22px;}
.nav-btn span{font-size:9px;letter-spacing:.6px;font-weight:600;text-transform:uppercase;}
.nav-btn:active{transform:scale(0.9);}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin:0 16px 12px;}
.card-sm{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;}

/* HEADERS */
.screen-header{padding:16px 16px 0;display:flex;align-items:center;justify-content:space-between;min-height:56px;}
/* On sub-screens the global back button sits at top-left; offset the title */
.screen-header.has-back{padding-left:58px;}
.screen-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;color:var(--text);}
.icon-btn{background:var(--card);border:1px solid var(--border);border-radius:10px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);transition:var(--transition);}
.icon-btn:active{transform:scale(0.9);}

/* BUTTONS */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px 20px;border-radius:12px;font-size:14px;font-weight:600;border:none;cursor:pointer;transition:var(--transition);font-family:'DM Sans',sans-serif;}
.btn:active{transform:scale(0.95);}
.btn-gold{background:var(--gold);color:#000;}
.btn-ghost{background:var(--card2);color:var(--text);border:1px solid var(--border);}
.btn-danger{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3);}
.btn-green{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3);}
.btn-full{width:100%;}

/* TAGS / CHIPS */
.chip{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.4px;background:var(--card2);color:var(--text2);border:1px solid var(--border);cursor:pointer;transition:var(--transition);}
.chip.active{background:var(--gold);color:#000;border-color:var(--gold);}
.chip:active{transform:scale(0.95);}

/* TOASTS */
#toast-container{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none;max-width:340px;width:90%;}
.toast{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 16px;font-size:13px;font-weight:500;color:var(--text);display:flex;align-items:center;gap:10px;animation:toastIn .3s ease;box-shadow:0 8px 32px rgba(0,0,0,.4);}
.toast.gold{border-color:var(--gold);background:rgba(245,197,24,.1);}
.toast.green{border-color:var(--green);background:rgba(34,197,94,.1);}
.toast.red{border-color:var(--red);background:rgba(239,68,68,.1);}
@keyframes toastIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.undo-toast{position:fixed;left:16px;right:16px;bottom:82px;z-index:720;background:var(--card);border:1px solid var(--gold);border-radius:14px;padding:12px 14px;box-shadow:0 8px 30px rgba(0,0,0,.45);font-size:13px;font-weight:700;color:var(--text);overflow:hidden;cursor:pointer;max-width:488px;margin:0 auto;}
.undo-toast-bar{position:absolute;left:0;bottom:0;height:3px;background:var(--gold);animation:undoBar 5s linear forwards;}
@keyframes undoBar{from{width:100%}to{width:0}}

/* BOTTOM SHEET */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;display:none;align-items:flex-end;}
.sheet-overlay.open{display:flex;}
.sheet{background:var(--bg2);border-radius:20px 20px 0 0;padding:20px;width:100%;max-height:85vh;overflow-y:auto;animation:sheetUp .3s cubic-bezier(.4,0,.2,1);}
.sheet::-webkit-scrollbar{display:none;}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px;}

/* MODAL OVERLAY */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:600;display:none;align-items:center;justify-content:center;padding:16px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg2);border-radius:20px;padding:24px;width:100%;max-width:440px;max-height:85vh;overflow-y:auto;animation:modalIn .25s ease;}
@keyframes modalIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}

/* INPUTS */
.input{background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;font-size:14px;color:var(--text);width:100%;outline:none;font-family:'DM Sans',sans-serif;transition:var(--transition);}
.input:focus{border-color:var(--gold);}
.textarea{min-height:80px;resize:none;line-height:1.5;}
label{font-size:11px;font-weight:600;letter-spacing:.5px;color:var(--text2);text-transform:uppercase;display:block;margin-bottom:6px;}

/* PROGRESS BAR */
.progress-bar{background:var(--bg3);border-radius:4px;height:6px;overflow:hidden;}
.progress-fill{height:100%;border-radius:4px;background:var(--gold);transition:width .5s ease;}

/* HABIT CARD */
.habit-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin:0 16px 10px;display:flex;align-items:center;gap:12px;transition:var(--transition);cursor:pointer;}
.habit-card:active{transform:scale(0.98);}
.habit-card.done{border-color:rgba(34,197,94,.3);background:rgba(34,197,94,.05);}
.habit-card.skipped{border-color:rgba(239,68,68,.3);background:rgba(239,68,68,.05);}
.habit-card.dragging{opacity:.5;}
.habit-card.drop-target{border-top:3px solid var(--gold);}
.habit-card.archived{opacity:.55;filter:grayscale(.6);}
.habit-drag{font-size:20px;color:var(--text3);cursor:grab;line-height:1;touch-action:none;}
.habit-card.swiping{transition:none;}
.habit-card.swipe-done{box-shadow:inset 80px 0 0 rgba(34,197,94,.18);}
.habit-card.swipe-skip{box-shadow:inset -80px 0 0 rgba(239,68,68,.18);}
.habit-icon{width:40px;height:40px;border-radius:10px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.habit-info{flex:1;min-width:0;}
.habit-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:2px;}
.habit-meta{font-size:11px;color:var(--text3);}
.habit-note{font-size:11px;color:var(--text2);font-style:italic;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mastery-bar{height:4px;background:var(--bg3);border-radius:4px;margin-top:7px;overflow:hidden;}
.mastery-fill{height:100%;background:#a855f7;border-radius:4px;}
.habit-action{display:flex;gap:6px;flex-shrink:0;}
.hab-btn{width:32px;height:32px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;transition:var(--transition);}
.hab-btn:active{transform:scale(0.85);}
.hab-btn.done-btn{border-color:var(--green);background:rgba(34,197,94,.15);color:var(--green);}
.hab-btn.skip-btn{border-color:var(--red);background:rgba(239,68,68,.15);color:var(--red);}

/* SECTION LABEL */
.section-label{padding:16px 16px 8px;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);}

/* GRID 2 */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px;margin-bottom:12px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:4px;}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:.5px;color:var(--text);}
.stat-label{font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);}

/* RING */
.ring-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ring{width:140px;height:140px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;}
.ring-svg{width:150px;height:150px;filter:drop-shadow(0 0 6px rgba(245,197,24,.45));cursor:pointer;}
.ring-track{fill:none;stroke:var(--bg3);}
.ring-outer,.ring-inner-svg{fill:none;stroke-linecap:round;transform:rotate(-90deg);transform-origin:75px 75px;transition:stroke-dashoffset 1.2s ease-in-out;}
.ring-outer{stroke:var(--gold);stroke-width:8;}
.ring-inner-svg{stroke:var(--green);stroke-width:6;}
.ring-svg.pulse .ring-inner-svg{animation:pulse 1.8s ease infinite;}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;}
.ring-inner{width:108px;height:108px;border-radius:50%;background:var(--bg2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;}
.ring-day{font-family:'Bebas Neue',sans-serif;font-size:38px;line-height:1;color:var(--text);}
.ring-of{font-size:11px;color:var(--text3);font-weight:600;}
.ring-streak{font-size:10px;color:var(--gold);font-weight:700;letter-spacing:.5px;margin-top:2px;}

/* ONBOARDING */
#onboarding{position:fixed;inset:0;background:var(--bg);z-index:999;display:none;flex-direction:column;}
#onboarding.show{display:flex;}
.ob-dots{display:flex;justify-content:center;gap:6px;padding:12px 0 8px;}
.ob-dot{width:7px;height:7px;border-radius:50%;background:var(--border);transition:var(--transition);}
.ob-dot.active{background:var(--gold);width:20px;border-radius:4px;}
.ob-steps-wrap{flex:1;overflow:hidden;position:relative;}
.ob-step{position:absolute;inset:0;padding:24px 24px 0;display:flex;flex-direction:column;transition:transform .35s cubic-bezier(.4,0,.2,1);overflow-y:auto;}
.ob-step::-webkit-scrollbar{display:none;}
.ob-heading{font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:1px;color:var(--text);margin-bottom:8px;line-height:1.1;}
.ob-sub{font-size:14px;color:var(--text2);margin-bottom:24px;line-height:1.5;}
.ob-card-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.ob-card{background:var(--card);border:2px solid var(--border);border-radius:14px;padding:16px 12px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;transition:var(--transition);}
.ob-card:active{transform:scale(0.95);}
.ob-card.selected{border-color:var(--gold);background:rgba(245,197,24,.08);}
.ob-card-emoji{font-size:30px;}
.ob-card-label{font-size:13px;font-weight:600;text-align:center;color:var(--text);}
.ob-footer{padding:16px 24px 32px;display:flex;flex-direction:column;gap:10px;}
.ob-back{background:none;border:none;color:var(--text3);font-size:14px;cursor:pointer;padding:8px;align-self:flex-start;}

/* XP BAR */
.xp-bar-wrap{padding:0 16px;margin-bottom:12px;}
.xp-bar-top{display:flex;justify-content:space-between;margin-bottom:6px;}
.xp-label{font-size:11px;font-weight:600;letter-spacing:.5px;color:var(--text3);}

/* 90-DAY BAR */
.day-bar{display:flex;gap:1.5px;padding:0 16px;margin-bottom:16px;flex-wrap:nowrap;overflow:hidden;}
.day-seg{flex:1;height:8px;border-radius:2px;min-width:0;}

/* HEATMAP */
.heatmap-row{display:flex;gap:2px;flex-wrap:nowrap;overflow:hidden;}
.hm-cell{flex:1;height:8px;border-radius:2px;min-width:0;}

/* CALENDAR */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:0 12px;}
.cal-cell{aspect-ratio:1;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;font-weight:600;cursor:pointer;position:relative;border:1px solid transparent;}
.cal-cell.today{border-color:var(--gold);}
.cal-cell.future{opacity:.3;}
.cal-dot{width:5px;height:5px;border-radius:50%;margin-top:2px;}

/* BADGES */
.badge-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:0 16px;}
.badge-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 8px;display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center;}
.badge-item.unlocked{border-color:rgba(245,197,24,.4);background:rgba(245,197,24,.05);}
.badge-item.locked{opacity:.35;}
.badge-emoji{font-size:26px;}
.badge-name{font-size:10px;font-weight:700;letter-spacing:.3px;color:var(--text);}
.badge-desc{font-size:9px;color:var(--text3);line-height:1.3;}

/* LEVEL UP OVERLAY */
#levelup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:900;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
#levelup-overlay.show{display:flex;}
.levelup-num{font-family:'Bebas Neue',sans-serif;font-size:100px;color:var(--gold);line-height:1;animation:pulse 1s ease infinite;}
@keyframes pulse{50%{opacity:.7}}

/* CANVAS CONFETTI */
#confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:850;}

/* FOCUS TIMER */
.timer-display{font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:3px;text-align:center;color:var(--text);line-height:1;}
.timer-ring{width:200px;height:200px;border-radius:50%;margin:0 auto;position:relative;display:flex;align-items:center;justify-content:center;}
.timer-svg{position:absolute;inset:0;transform:rotate(-90deg);}
.timer-bg{fill:none;stroke:var(--bg3);stroke-width:8;}
.timer-prog{fill:none;stroke:var(--gold);stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset .5s linear;}

/* WEEKLY MINI CHART */
.week-chart{display:flex;gap:4px;padding:0 16px;}
.wc-day{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.wc-bar{width:100%;border-radius:4px;background:var(--bg3);}
.wc-label{font-size:9px;font-weight:600;color:var(--text3);}

/* REPORTS */
.report-chart{padding:0 16px;margin-bottom:16px;}

/* QUOTE CARD */
.quote-card{background:linear-gradient(135deg,var(--card),var(--card2));border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin:0 16px 12px;position:relative;overflow:hidden;}
.quote-text{font-size:16px;font-weight:500;line-height:1.6;color:var(--text);font-style:italic;margin-bottom:10px;}
.quote-author{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);}
.quote-category{position:absolute;top:12px;right:12px;font-size:9px;font-weight:700;letter-spacing:1px;color:var(--gold);background:rgba(245,197,24,.1);padding:3px 8px;border-radius:20px;}

/* BOOK LOG */
.book-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;display:flex;gap:12px;align-items:flex-start;}
.book-cover{width:44px;height:60px;border-radius:6px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}

/* COACH CARD */
.coach-card{background:linear-gradient(135deg,rgba(245,197,24,.1),rgba(245,197,24,.03));border:1px solid rgba(245,197,24,.25);border-radius:var(--radius);padding:16px;margin:0 16px 12px;}

/* SCORE RING */
.score-ring{width:90px;height:90px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:32px;flex-shrink:0;}

/* MISC */
.divider{height:1px;background:var(--border);margin:12px 16px;}
.flex-between{display:flex;align-items:center;justify-content:space-between;}
.flex-gap{display:flex;align-items:center;gap:8px;}
.empty-state{text-align:center;padding:40px 24px;color:var(--text3);}
.empty-icon{font-size:40px;margin-bottom:12px;}
.empty-text{font-size:14px;font-weight:500;margin-bottom:4px;color:var(--text2);}
.empty-sub{font-size:12px;}
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;letter-spacing:.3px;}
.tag-gold{background:rgba(245,197,24,.15);color:var(--gold);}
.tag-green{background:rgba(34,197,94,.15);color:var(--green);}
.tag-red{background:rgba(239,68,68,.15);color:var(--red);}
.tag-blue{background:rgba(59,130,246,.15);color:var(--blue);}
.toggle{position:relative;width:44px;height:24px;flex-shrink:0;}
.toggle input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;inset:0;background:var(--bg3);border-radius:12px;cursor:pointer;transition:var(--transition);}
.toggle-slider:before{content:'';position:absolute;left:3px;top:3px;width:18px;height:18px;border-radius:50%;background:var(--text3);transition:var(--transition);}
.toggle input:checked + .toggle-slider{background:var(--gold);}
.toggle input:checked + .toggle-slider:before{transform:translateX(20px);background:#000;}
.mission-card{background:linear-gradient(135deg,#1a1a10,#1f1f14);border:1px solid rgba(245,197,24,.2);border-radius:var(--radius);padding:16px;margin:0 16px 12px;}
.mission-label{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);margin-bottom:6px;}
.mission-text{font-size:15px;font-weight:600;color:var(--text);line-height:1.4;margin-bottom:10px;}
.mission-prompt{font-size:12px;color:var(--text2);font-style:italic;line-height:1.4;}
.streak-banner{background:linear-gradient(135deg,rgba(239,68,68,.15),rgba(239,68,68,.05));border:1px solid rgba(239,68,68,.3);border-radius:var(--radius);padding:14px 16px;margin:0 16px 12px;display:flex;align-items:center;gap:12px;}
.comeback-banner{background:linear-gradient(135deg,rgba(245,197,24,.12),rgba(245,197,24,.04));border:1px solid rgba(245,197,24,.3);border-radius:var(--radius);padding:14px 16px;margin:0 16px 12px;}
.more-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px;}
.more-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;display:flex;flex-direction:column;gap:8px;cursor:pointer;transition:var(--transition);}
.more-card:active{transform:scale(0.96);}
.more-card-icon{font-size:26px;}
.more-card-label{font-size:13px;font-weight:700;color:var(--text);}

let state = blank();
function normalizeState() {
  const base = blank();
  state = Object.assign(base, state || {});
  state.profile = Object.assign(base.profile, state.profile || {});
  state.settings = Object.assign(base.settings, state.settings || {});
  if(!state.settings.theme) state.settings.theme = state.settings.dark === false ? 'light' : 'dark';
  if(!state.settings.readingGoal) state.settings.readingGoal = {type:'books',target:1};
  // Normalize profile avatar/bio defaults
  if(!state.profile.avatarEmoji) state.profile.avatarEmoji = '🔥';
  if(!state.profile.avatarColor) state.profile.avatarColor = '#f5c518';
  if(state.profile.bio===undefined) state.profile.bio = '';
  if(state.profile.whyStatement===undefined) state.profile.whyStatement = '';
  // Object keys
  ['habitNotes','hintsDismissed','dismissedPatterns','weeklySummaries','habitMastery','surpriseDone','predictiveWarningDismissed','bookHighlights','encryptedJournal','missedDays','weeklyReviews','weeklyReviewDismissed','badges','badgeXpAwarded','dayLog','reflections','dayLockTimes','dayLogTimes','waterLog','waterXpAwarded'].forEach(k=>{ if(!state[k]) state[k]={}; });
  // Array keys
  ['dismissedSuggestions','focusTasks','books','focusSessions','habits','savedCards','pastChallenges','comebackPlan','importedPacks','userTemplates'].forEach(k=>{ if(!Array.isArray(state[k])) state[k]=[]; });
  if(state.waterGoal===undefined||state.waterGoal===null) state.waterGoal=8;
  state.habits.forEach(h=>{
    if(!h.id) h.id=uid();
    if(!h.scheduleDays) h.scheduleDays=[0,1,2,3,4,5,6];
    if(!h.tags) h.tags=[];
    if(h.archived==null) h.archived=false;
    if(h.reminderTime===undefined) h.reminderTime=null;
  });
  const pd = state.pausedUntil;
  if(pd && today() > pd) {
    state.pausedUntil = null;
    state.pauseStart = null;
    setTimeout(()=>showToast('Your challenge has resumed. Welcome back.','gold'),500);
  }
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate()-3);
  state.focusTasks.forEach(t=>{ if(t.date && new Date(t.date)<cutoff && !t.done) t.archived=true; });
}
function load() {
  try {
    const s = localStorage.getItem(KEY);
    if (s) state = Object.assign(blank(), JSON.parse(s));
  } catch(e){}
  normalizeState();
}
function save() {
  try {
    const out = state.settings?.encrypted ? Object.assign({}, state, {reflections:{}}) : state;
    localStorage.setItem(KEY, JSON.stringify(out));
  } catch(e) {
    if(e && e.name === 'QuotaExceededError') {
      showToast('Storage full! Export backup now.','red',8000);
      const compressedState = JSON.parse(JSON.stringify(state));
      Object.keys(compressedState.reflections || {}).slice(0,-7).forEach(date=>{
        if(compressedState.reflections[date]?.morning?.photo) delete compressedState.reflections[date].morning.photo;
        if(compressedState.reflections[date]?.night?.photo) delete compressedState.reflections[date].night.photo;
      });
      try { localStorage.setItem(KEY, JSON.stringify(compressedState)); } catch(e2) {}
    }
  }
}
load();

// HELPERS
// ═══════════════════════════════════════════════
function today() { return new Date().toISOString().split('T')[0]; }
function dayNum() {
  if (!state.startDate) return 1;
  const diff = Math.floor((new Date(today()) - new Date(state.startDate)) / 86400000);
  return Math.max(1, diff + 1);
}
function weekNum() { return Math.ceil(dayNum() / 7); }
function getLevel(xp) {
  let lvl = LEVELS[0];
  for (const l of LEVELS) { if (xp >= l.min) lvl = l; else break; }
  return lvl;
}
function nextLevel(xp) {
  for (const l of LEVELS) { if (l.min > xp) return l; }
  return null;
}
function getDayLog(date) {
  if (!state.dayLog[date]) state.dayLog[date] = {};
  return state.dayLog[date];
}
function habitStatus(habitId, date) {
  return getDayLog(date)[habitId] || 'pending';
}
function setHabitStatus(habitId, status, date) {
  if (!state.dayLog[date]) state.dayLog[date] = {};
  state.dayLog[date][habitId] = status;
}
function todayHabits() {
  const log = getDayLog(today());
  const done = state.habits.filter(h=>log[h.id]==='done').length;
  const skipped = state.habits.filter(h=>log[h.id]==='skipped').length;
  return {done, skipped, total: state.habits.length, pending: state.habits.length - done - skipped};
}
function focusToday() {
  return state.focusSessions.filter(s=>s.date===today()).reduce((a,s)=>a+(s.mins||0),0);
}
function totalPages() { return state.books.reduce((a,b)=>a+(b.pages||0),0); }
function journalCount() { return Object.keys(state.reflections).length; }
function riseScore() {
  const th = todayHabits();
  const habitPct = th.total>0 ? th.done/th.total : 0;
  const focusPct = Math.min(focusToday()/90,1);
  const j = state.reflections[today()];
  const journalScore = j && (j.morning || j.night) ? 1 : 0;
  const pagesScore = Math.min(totalPages()/500,1);
  return Math.round(habitPct*55 + focusPct*25 + journalScore*10 + pagesScore*10);
}
function weekCompletion() {
  let total=0, done=0;
  for (let i=0;i<7;i++) {
    const d = new Date(); d.setDate(d.getDate()-i);
    const ds = d.toISOString().split('T')[0];
    const log = state.dayLog[ds]||{};
    total += state.habits.length;
    done += state.habits.filter(h=>log[h.id]==='done').length;
  }
  return total>0 ? Math.round(done/total*100) : 0;
}
function habitWeekPct(habitId) {
  let done=0;
  for(let i=0;i<7;i++){
    const d=new Date();d.setDate(d.getDate()-i);
    const ds=d.toISOString().split('T')[0];
    if((state.dayLog[ds]||{})[habitId]==='done') done++;
  }
  return {done, pct:Math.round(done/7*100)};
}
function habitStreak(habitId) {
  let streak=0;
  for(let i=0;;i++){
    const d=new Date();d.setDate(d.getDate()-i);
    const ds=d.toISOString().split('T')[0];
    if((state.dayLog[ds]||{})[habitId]==='done') streak++;
    else break;
  }
  return streak;
}
function uid(){return Math.random().toString(36).slice(2,9);}
function todayPrompt(){return JOURNAL_PROMPTS[(dayNum()-1)%JOURNAL_PROMPTS.length];}
function todayChallenge(){return DAILY_CHALLENGES[(dayNum()-1)%DAILY_CHALLENGES.length];}

function addXP(amount) {
  const before = getLevel(state.xp).num;
  state.xp += amount;
  const after = getLevel(state.xp).num;
  if (after > before) {
    const lvl = getLevel(state.xp);
    showLevelUp(lvl);
  }
  save();
}

function updateStreak() {
  const t = today();
  const th = todayHabits();
  if (th.done > 0) {
    if (state.lastDoneDate === t) return;
    const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
    const ys = yesterday.toISOString().split('T')[0];
    if (state.lastDoneDate === ys || state.lastDoneDate === t) {
      state.streak = (state.streak||0) + 1;
    } else if (!state.lastDoneDate) {
      state.streak = 1;
    } else {
      state.streak = 1;
    }
    state.lastDoneDate = t;
    save();
  }
}

function checkBadges() {
  const th = todayHabits();
  const jCount = journalCount();
  const focusCount = state.focusSessions.filter(s=>s.completed).length;
  const maxFocus = Math.max(0,...state.focusSessions.filter(s=>s.date===today()).map(s=>s.mins||0));
  const totalFocusToday = focusToday();
  const focusSessionsToday = state.focusSessions.filter(s=>s.date===today()).length;

  function unlock(key) {
    if (!state.badges[key]) {
      state.badges[key] = today();
      const def = BADGES_DEF.find(b=>b.key===key);
      if (def && !state.badgeXpAwarded[key]) {
        state.badgeXpAwarded[key] = true;
        addXP(def.xp);
        showToast(`${def.emoji} Badge unlocked: ${def.name}! +${def.xp} XP`, 'gold');
        launchConfetti(40);
      }
      save();
    }
  }

  // Check conditions
  if (Object.values(state.dayLog).some(log=>Object.values(log).includes('done'))) unlock('first_day');
  if (state.streak >= 3) unlock('streak_3');
  if (state.streak >= 7) unlock('streak_7');
  if (dayNum() >= 30) unlock('day_30');
  if (dayNum() >= 66) unlock('day_66');
  if (dayNum() >= 90) unlock('day_90');
  if (jCount >= 7) unlock('journal_7');
  if (focusCount >= 10) unlock('focus_10');
  if (state.focusSessions.some(s=>s.mins>=90)) unlock('deep_90');
  if (totalPages() >= 100) unlock('pages_100');
  if (totalFocusToday >= 90) unlock('monk_mode');
  if (focusSessionsToday >= 3) unlock('flow_state');
  if (state.freezeTokens >= 3) unlock('cold_banker');
  if (th.total > 0 && th.done === th.total && th.total > 0) {
    // perfect day
  }
  // 14-day no zero
  let noZero=true;
  for(let i=0;i<14;i++){
    const d=new Date();d.setDate(d.getDate()-i);
    const ds=d.toISOString().split('T')[0];
    const log=state.dayLog[ds]||{};
    if(!Object.values(log).includes('done')){noZero=false;break;}
  }
  if(noZero && dayNum()>=14) unlock('no_zero_14');
  if(noZero && dayNum()>=14) unlock('iron_cal');
}

// CONFETTI
// ═══════════════════════════════════════════════
function launchConfetti(count=60) {
  const canvas = document.getElementById('confetti-canvas');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const particles = [];
  const colors = ['#f5c518','#22c55e','#3b82f6','#ef4444','#a855f7','#f97316'];
  for(let i=0;i<count;i++){
    particles.push({
      x: Math.random()*canvas.width, y: -10,
      vx: (Math.random()-0.5)*4, vy: Math.random()*3+2,
      color: colors[Math.floor(Math.random()*colors.length)],
      size: Math.random()*8+4, angle: Math.random()*360, spin: (Math.random()-0.5)*10
    });
  }
  let frame = 0;
  function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.angle+=p.spin; p.vy+=0.08;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.angle*Math.PI/180);
      ctx.fillStyle=p.color; ctx.fillRect(-p.size/2,-p.size/4,p.size,p.size/2);
      ctx.restore();
    });
    frame++;
    if(frame<120) requestAnimationFrame(animate);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  animate();
}

// NAVIGATION
// ═══════════════════════════════════════════════
let currentScreen = 'home';
const NAV_TABS = ['home','habits','journal','focus','more'];
const screenHistory = [];

function goScreen(name) {
  // Push current screen to history if it's different
  if (currentScreen && currentScreen !== name) {
    screenHistory.push(currentScreen);
    if (screenHistory.length > 20) screenHistory.shift(); // cap history
  }
  _showScreen(name);
}

function goBack() {
  if (screenHistory.length === 0) {
    // Nothing to go back to — go home
    _showScreen('home');
    return;
  }
  const prev = screenHistory.pop();
  _showScreen(prev);
}

function _showScreen(name) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const scr = document.getElementById('screen-'+name);
  if (!scr) { _showScreen('home'); return; }
  scr.classList.add('active');
  const nb = document.getElementById('nav-'+name);
  if(nb) nb.classList.add('active');
  // Hide floating add on non-home screens
  const fab = document.getElementById('fab-add');
  if(fab) fab.style.display = name==='home'||name==='habits' ? 'flex':'none';
  currentScreen = name;
  // Show/hide back button
  updateBackBtn(name);
  renderScreen(name);
}

function updateBackBtn(name) {
  // Back button is shown on all non-tab screens
  const isTab = NAV_TABS.includes(name);
  const canGoBack = screenHistory.length > 0;
  // Inject or update a floating back button
  let bb = document.getElementById('global-back-btn');
  if (!bb) {
    bb = document.createElement('button');
    bb.id = 'global-back-btn';
    bb.onclick = goBack;
    bb.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>`;
    bb.title = 'Go back';
    document.getElementById('app').appendChild(bb);
  }
  const show = (!isTab || canGoBack) && name !== 'home';
  bb.style.display = show ? 'flex' : 'none';

  // After a short delay (allow renderScreen to run), add has-back to headers on sub-screens
  if (show) {
    setTimeout(() => {
      const scr = document.getElementById('screen-' + name);
      if (scr) {
        const hdr = scr.querySelector('.screen-header');
        if (hdr) hdr.classList.add('has-back');
      }
    }, 20);
  }
}

function obToggleHabit(name){
  const i = obData.habits.indexOf(name);
  if(i>=0) obData.habits.splice(i,1); else obData.habits.push(name);
}

function updateObNext(){
  const btn = document.getElementById('ob-next-btn');
  if(obStep===1){ btn.disabled = !obData.name || obData.name.length<2; }
  else if(obStep===2){ btn.disabled = !obData.goal; }
  else if(obStep===5){ btn.disabled = obData.habits.length<3; btn.textContent=`Start Day 1 (${obData.habits.length} selected)`; }
  else btn.disabled = false;
  btn.style.opacity = btn.disabled?'0.5':'1';
}

function obNext(){
  if(obStep===5){
    // Commit habits
    obData.habits.forEach(name=>{
      const def = STARTER_HABITS.find(h=>h.name===name);
      if(def) state.habits.push({id:uid(),emoji:def.emoji,name:def.name,area:def.area,xp:def.xp});
    });
    state.profile = {...obData};
    state.onboarded = true;
    state.startDate = today();
    save();
    obStep++;
    renderObStep();
    return;
  }
  if(obStep===6){
    // Schedule reminder
    const rt = document.getElementById('ob-reminder');
    if(rt) state.settings.reminderTime = rt.value;
    state.settings.morningReminder = true;
    save();
    finishOnboarding();
    return;
  }
  obStep = Math.min(obStep+1, OB_STEPS.length-1);
  renderObStep();
}
function obBack(){ obStep=Math.max(0,obStep-1); renderObStep(); }
function obSkip(){ finishOnboarding(); }
function finishOnboarding(){
  document.getElementById('onboarding').classList.remove('show');
  document.getElementById('nav').style.display='flex';
  render();
}

function getCoachMessage(){

  const ft = focusToday();
  const lr = state.reflections[today()];

  if(state.streak===0 && miss>2) return `You've missed ${miss} days. The gap is not the problem — not returning is. Start with one habit.`;
  if(state.streak>=7 && pct<0.3) return `7-day streak at risk. You have ${th.pending} habits left. Do the easiest one now to protect your momentum.`;
  if(ft===0 && h>=14) return "No focus session yet today. Even 15 minutes of deep work will change your score.";

  if(weekCompletion()>85) return `You're at ${weekCompletion()}% this week. Elite consistency. Consider adding a harder habit.`;
  if(pct===1 && th.total>0) return "Perfect day. Every habit done. This is who you are becoming.";
  const lvl = getLevel(state.xp);
  if(lvl.num>=7) return `${lvl.name} level. You're in the top tier. Add one extreme habit to stay challenged.`;

}

let habitFilter = 'All';
function renderHabits(){
  const el = document.getElementById('screen-habits');
  const log = getDayLog(today());
  const filters=['All','Morning','Afternoon','Evening','Done','Pending','Skipped'];

  let habits = state.habits;
  if(habitFilter!=='All'){
    const f=habitFilter.toLowerCase();
    if(['morning','afternoon','evening'].includes(f)) habits=habits.filter(h=>h.area===f);
    else habits=habits.filter(h=>log[h.id]===f);
  }

  const th = todayHabits();
  const doneAll = th.total>0&&th.done===th.total;

  el.innerHTML=`
    <div class="screen-header">
      <div class="screen-title">Habits</div>
      <button class="icon-btn" onclick="openAddHabit()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
    </div>
    <div class="habit-filter-chips">${filters.map(f=>`<div class="chip ${habitFilter===f?'active':''}" onclick="habitFilter='${f}';renderHabits()">${f}</div>`).join('')}</div>
    <div style="padding:4px 16px 10px;display:flex;align-items:center;justify-content:space-between;">
      <span style="font-size:13px;color:var(--text2);">${th.done}/${th.total} done today</span>
      ${doneAll?`<span class="tag tag-green">✓ Perfect Day!</span>`:`<span class="tag tag-gold">${th.pending} left</span>`}
    </div>
    ${habits.length===0?`<div class="empty-state"><div class="empty-icon">✅</div><div class="empty-text">No habits ${habitFilter!=='All'?'in this filter':''}</div><div class="empty-sub">${habitFilter==='All'?'Add your first habit and start Day 1.':''}</div>${habitFilter==='All'?`<button class="btn btn-gold" style="margin-top:16px;" onclick="openAddHabit()">+ Add Habit</button>`:''}</div>`:''}
    ${habits.map(h=>{
      const status=log[h.id]||'pending';
      const wp=habitWeekPct(h.id);
      return `<div class="habit-card ${status}" data-id="${h.id}" oncontextmenu="openHabitStats('${h.id}');return false;" onclick="">
        <div class="habit-icon">${h.emoji}</div>
        <div class="habit-info">
          <div class="habit-name">${h.name}</div>
          <div class="habit-meta">This week: ${wp.done}/7 (${wp.pct}%) · ${h.area}</div>
        </div>
        <div class="habit-action">
          <div class="hab-btn ${status==='done'?'done-btn':''}" onclick="toggleHabit('${h.id}','done')">✓</div>
          <div class="hab-btn ${status==='skipped'?'skip-btn':''}" onclick="toggleHabit('${h.id}','skipped')">✕</div>
        </div>
      </div>`;
    }).join('')}
    <div style="height:16px;"></div>
  `;
}

function toggleHabit(id, action){
  const log=getDayLog(today());
  const current=log[id]||'pending';
  if(current===action) { log[id]='pending'; }
  else {
    log[id]=action;
    if(action==='done'){
      const h=state.habits.find(h=>h.id===id);
      if(h) addXP(h.xp||20);
      showToast(`✓ ${state.habits.find(h=>h.id===id)?.name} done! +${state.habits.find(h=>h.id===id)?.xp||20} XP`,'green');
      // flash
      updateStreak();
    }
  }
  const th=todayHabits();
  if(th.done===th.total&&th.total>0){
    showToast('🔥 All habits done! Perfect day!','gold');
    launchConfetti(60);
  }
  state.dayLog[today()]=log;
  save();
  checkBadges();
  renderScreen(currentScreen);
}

function openHabitStats(id){
  const h=state.habits.find(h=>h.id===id);
  if(!h) return;
  const wp=habitWeekPct(id);
  let total=0,done=0,skipped=0,missed=0;
  Object.entries(state.dayLog).forEach(([date,log])=>{
    if(log[id]){total++;if(log[id]==='done')done++;else if(log[id]==='skipped')skipped++;else missed++;}
  });
  const consistency=total>0?Math.round(done/total*100):0;
  const streak=habitStreak(id);

  // Mini heatmap
  let hm='<div class="heatmap-row">';
  for(let i=89;i>=0;i--){
    const d=new Date(state.startDate);d.setDate(d.getDate()+89-i);
    const ds=d.toISOString().split('T')[0];
    const st=(state.dayLog[ds]||{})[id];
    const col=st==='done'?'var(--green)':st==='skipped'?'var(--red)':'var(--bg3)';
    hm+=`<div class="hm-cell" style="background:${col};"></div>`;
  }
  hm+='</div>';

  // FEATURE 6: Time pattern
  const timePtn=habitTimePatternHtml(id);
  // FEATURE 7: Reminder info
  const remInfo=h.reminderTime?`<div style="font-size:12px;color:var(--text2);margin-bottom:10px;">⏰ Reminder: ${h.reminderTime}</div>`:`<div style="font-size:12px;color:var(--text3);margin-bottom:10px;">⏰ Reminder: Using global (${state.settings.reminderTime||'06:15'})</div>`;
  // Lock status
  const lockTime=(state.dayLockTimes[today()]||{})[id];
  const lockInfo=lockTime?`<div style="font-size:11px;color:var(--text3);margin-bottom:8px;">🔒 Locked at ${new Date(lockTime).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}</div>`:'';

  openSheet(`
    <div style="font-size:22px;font-weight:700;color:var(--text);margin-bottom:16px;">${h.emoji} ${h.name}</div>
    ${lockInfo}${remInfo}
    <div class="grid2" style="padding:0;margin-bottom:16px;">
      <div class="stat-card"><div class="stat-val">${streak}</div><div class="stat-label">Current Streak</div></div>
      <div class="stat-card"><div class="stat-val">${done}</div><div class="stat-label">Total Done</div></div>
      <div class="stat-card"><div class="stat-val">${skipped}</div><div class="stat-label">Skipped</div></div>
      <div class="stat-card"><div class="stat-val">${consistency}%</div><div class="stat-label">Consistency</div></div>
    </div>
    <div style="margin-bottom:16px;"><div class="xp-label" style="margin-bottom:6px;">90-DAY HEATMAP</div>${hm}</div>
    ${timePtn}
    <div style="display:flex;flex-direction:column;gap:8px;">
      <button class="btn btn-ghost btn-full" onclick="editHabit('${id}')">✏ Edit Habit</button>
      <button class="btn btn-danger btn-full" onclick="deleteHabit('${id}')">🗑 Delete Habit</button>
      <button class="btn btn-ghost btn-full" onclick="closeSheetForce()">Close</button>
    </div>
  `);
}

function deleteHabit(id){
  if(confirm('Delete this habit?')){
    state.habits=state.habits.filter(h=>h.id!==id);
    save();
    closeSheetForce();
    renderScreen(currentScreen);

function editHabit(id){

  const tagsHtml=HABIT_TAGS.map(t=>`<button type="button" class="pill-btn ${(h.tags||[]).includes(t)?'active':''}" style="margin:2px;" onclick="this.classList.toggle('active')">${esc(t)}</button>`).join('');

function saveEditHabit(id){
  const h=state.habits.find(h=>h.id===id);
  if(!h) return;
  h.emoji=document.getElementById('edit-emoji').value;
  h.name=document.getElementById('edit-name').value;
  h.area=document.getElementById('edit-area').value;
  h.xp=parseInt(document.getElementById('edit-xp').value)||20;
  // Save tags
  h.tags=[...document.querySelectorAll('#edit-tags-container .pill-btn.active')].map(b=>b.textContent.trim());
  // Save reminder
  const hasReminder=document.getElementById('edit-reminder-toggle')?.checked;
  h.reminderTime=hasReminder?(document.getElementById('edit-reminder-time')?.value||null):null;
  save();
  closeModalForce();
  renderScreen(currentScreen);
  showToast('Habit updated','green');
}

let jMoodM=0, jMoodN=0, jSleepQuality=0;
function setJMood(val, type){
  if(type==='morning') jMoodM=val; else jMoodN=val;
  // Update UI
  document.querySelectorAll('.mood-btn').forEach((b,i)=>{
    b.classList.toggle('active', i+1===val);
  });
}
function setJSleep(val){
  jSleepQuality=val;
  document.querySelectorAll('.sleep-btn').forEach((b,i)=>{
    b.classList.toggle('active', i+1===val);
  });
}

function saveMorning(){
  if(!state.reflections[today()]) state.reflections[today()]={};
  const mood=jMoodM||parseInt(document.querySelectorAll('.mood-btn.active')[0]?.dataset?.val||'3');
  state.reflections[today()].morning={
    intention:document.getElementById('j-intention')?.value||'',
    oneTask:document.getElementById('j-onetask')?.value||'',
    grateful:document.getElementById('j-grateful')?.value||'',
    mood:jMoodM||3,
    energy:parseInt(document.getElementById('j-energy')?.value||'5'),
    sleepQuality:jSleepQuality||state.reflections[today()]?.morning?.sleepQuality||null
  };
  save();
  addXP(20);
  showToast('Morning set. Go execute. +20 XP','green');
  jMoodM=0;
  renderJournal();

let focusState = {running:false,paused:false,totalSecs:1500,remaining:1500,preset:25,task:'',interval:null};

  const mins=Math.floor(focusState.remaining/60);

  el.innerHTML=`

        <div class="preset-min">${p.mins||'?'}</div>
        <div class="preset-name">${p.label}</div>
      </div>`).join('')}</div>

    <!-- Task input -->
    ${!focusState.running?`<div style="padding:0 16px 16px;"><input class="input" id="focus-task" placeholder="What are you working on?" value="${focusState.task}" oninput="focusState.task=this.value"></div>`:''}

    <!-- Timer Ring -->
    <div class="timer-ring">
      <svg class="timer-svg" viewBox="0 0 200 200">
        <circle class="timer-bg" cx="100" cy="100" r="86"/>
        <circle class="timer-prog" cx="100" cy="100" r="86" stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke="${pct>0.8?'var(--green)':'var(--gold)'}"/>
      </svg>
      <div>
        <div class="timer-display">${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}</div>
        ${focusState.task?`<div style="font-size:11px;color:var(--text3);text-align:center;margin-top:4px;">${focusState.task}</div>`:''}
      </div>
    </div>

    <!-- Controls -->
    <div style="display:flex;gap:10px;padding:16px;justify-content:center;">
      ${!focusState.running?`<button class="btn btn-gold" style="padding:14px 32px;font-size:16px;" onclick="startFocus()">▶ Start</button>`:`
        <button class="btn btn-ghost" onclick="pauseFocus()">${focusState.paused?'▶ Resume':'⏸ Pause'}</button>
        <button class="btn btn-danger" onclick="stopFocus()">■ Stop</button>
      `}
    </div>

    <!-- Daily ring -->
    <div style="padding:0 16px;margin-bottom:16px;">
      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
          <span style="font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--text3);">DAILY GOAL</span>
          <span style="font-size:13px;font-weight:700;color:var(--gold);">${ft}/90 min</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${Math.min(ft/90*100,100)}%;"></div></div>
      </div>
    </div>

    <!-- Session log -->
    <div class="section-label">TODAY'S SESSIONS</div>
    ${sessions.length===0?`<div class="empty-state"><div class="empty-icon">⏱</div><div class="empty-text">No sessions today.</div><div class="empty-sub">Start your first 25-minute block.</div></div>`:''}
    ${sessions.map(s=>`<div class="focus-log-item">
      <div style="font-size:20px;">${s.completed?'✅':'⚠️'}</div>
      <div style="flex:1;">
        <div style="font-size:13px;font-weight:600;color:var(--text);">${s.task||'Focus Session'}</div>
        <div style="font-size:11px;color:var(--text3);">${s.mins} min · ${s.completed?'Completed':'Incomplete'} · +${s.xp||0} XP</div>
      </div>
    </div>`).join('')}
    <div style="height:16px;"></div>
  `;
}

function setFocusPreset(mins){
  if(focusState.running) return;
  focusState.preset=mins;
  focusState.totalSecs=mins*60;
  focusState.remaining=mins*60;
  renderFocus();
}

function setCustomFocus(){
  const mins=parseInt(prompt('Enter minutes (1-300):'))||25;
  setFocusPreset(Math.max(1,Math.min(300,mins)));
}

function startFocus(){
  if(focusState.preset===0){setCustomFocus();return;}
  focusState.running=true;
  focusState.paused=false;
  focusState.interval=setInterval(()=>{
    if(!focusState.paused){
      focusState.remaining--;
      if(focusState.remaining<=0){
        clearInterval(focusState.interval);
        focusState.running=false;
        focusComplete();
      }
    }
    if(currentScreen==='focus') renderFocus();
  },1000);
  renderFocus();
}

function pauseFocus(){
  focusState.paused=!focusState.paused;
  renderFocus();
}

function stopFocus(){
  clearInterval(focusState.interval);
  focusState.running=false;
  focusState.remaining=focusState.totalSecs;
  renderFocus();
}

function focusComplete(){
  // Show completion sheet
  const mins=focusState.preset||Math.round(focusState.totalSecs/60);
  let xp=mins>=90?80:mins>=45?60:40;
  openSheet(`
    <div style="text-align:center;margin-bottom:20px;">
      <div style="font-size:48px;">🎯</div>
      <div style="font-size:20px;font-weight:700;color:var(--text);margin-top:8px;">Session Complete!</div>
      <div style="font-size:13px;color:var(--text2);margin-top:4px;">${focusState.task||'Focus Session'} · ${mins} min</div>
    </div>
    <div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:16px;text-align:center;">Did you finish the task?</div>
    <div style="display:flex;gap:10px;margin-bottom:16px;">
      <button class="btn btn-green btn-full" onclick="logFocusSession(${mins},true,${xp})">✓ YES — Task Done</button>
      <button class="btn btn-danger btn-full" onclick="logFocusSession(${mins},false,${Math.round(xp/2)})">✗ NO — Incomplete</button>
    </div>
    <div style="font-size:12px;color:var(--text3);text-align:center;font-style:italic;">Incomplete counts too. Keep going.</div>
  `);
  try{ new Notification('LifeRebuild', {body:'Focus session complete! 🎯'}); }catch(e){}
}

function logFocusSession(mins, completed, xp){
  state.focusSessions.push({id:uid(),date:today(),mins,task:focusState.task,completed,xp});
  save();
  addXP(xp);
  closeSheetForce();
  showToast(`${completed?'✅':'⚠️'} +${xp} XP · ${mins} min ${completed?'done':'logged'}`,'gold');
  focusState.remaining=focusState.totalSecs;
  checkBadges();
  renderFocus();
}

function resetOption(opt){
  if(opt==='restart'){
    state.streak=1; state.lastDoneDate=today();
    addXP(25); save();
    closeSheetForce();
    showResetOverlay();
    checkBadges();
  } else if(opt==='continue'){
    state.streak=0;
    save(); closeSheetForce();
    showResetOverlay();
  } else if(opt==='write'){
    const note=document.getElementById('missed-note')?.value||'';
    if(note){ state.missedDays[today()]=note; save(); addXP(10); checkBadges(); }
    closeSheetForce();
    showResetOverlay();
  }
}

  const d1=document.getElementById('cp1')?.value;

  const d3=document.getElementById('cp3')?.value;
  if(d1) cp.push({day:1,intention:d1});

}

function cardSwipe(e){

function toggleSaveCard(){

// CALENDAR SCREEN
// ═══════════════════════════════════════════════
function renderCalendar(){
  const el=document.getElementById('screen-calendar');
  if(!state.calendarMonth) state.calendarMonth=new Date().toISOString().slice(0,7);
  const [yr,mo]=state.calendarMonth.split('-').map(Number);
  const monthNames=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const firstDay=new Date(yr,mo-1,1).getDay();
  const daysInMonth=new Date(yr,mo,0).getDate();
  const startOffset=(firstDay+6)%7; // Monday start

  // Month summary
  let green=0,amber=0,red=0,miss=0;
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${yr}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    if(ds>today()) continue;
    const log=state.dayLog[ds]||{};
    const done=state.habits.filter(h=>log[h.id]==='done').length;
    const total=state.habits.length;
    if(!total) continue;
    const pct=done/total;
    if(pct>=0.7) green++;
    else if(pct>0) amber++;
    else if(Object.values(log).includes('skipped')) red++;
    else miss++;
  }

  let cells='';
  // Empty cells
  for(let i=0;i<startOffset;i++) cells+=`<div class="cal-cell"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${yr}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isFuture=ds>today();
    const isToday=ds===today();
    const log=state.dayLog[ds]||{};
    const done=state.habits.filter(h=>log[h.id]==='done').length;
    const total=state.habits.length;
    let bg='var(--bg3)'; let dotCol='transparent';
    if(!isFuture && total>0){
      const pct=done/total;
      if(pct>=0.7){bg='rgba(34,197,94,.15)';dotCol='var(--green)';}
      else if(pct>0){bg='rgba(245,158,11,.15)';dotCol='var(--amber)';}
      else if(Object.values(log).includes('skipped')){bg='rgba(239,68,68,.15)';dotCol='var(--red)';}
      else{bg='var(--bg3)';dotCol='var(--text3)';}
    }
    if(isFuture){bg='transparent';dotCol='transparent';}
    cells+=`<div class="cal-cell ${isToday?'today':''} ${isFuture?'future':''}" style="background:${bg};" onclick="${!isFuture?`openCalDay('${ds}')`:''}">${d}<div class="cal-dot" style="background:${dotCol};"></div></div>`;
  }

  const daysOfWeek=['M','T','W','T','F','S','S'];

  el.innerHTML=`
    <div class="screen-header">
      <button class="back-btn" onclick="goScreen('more')">←</button>
      <div class="screen-title">Calendar</div>
      <div></div>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 16px 16px;">
      <button class="icon-btn" onclick="calNav(-1)">‹</button>
      <div style="font-size:16px;font-weight:700;">${monthNames[mo-1]} ${yr}</div>
      <button class="icon-btn" onclick="calNav(1)">›</button>
    </div>
    <div class="cal-grid" style="margin-bottom:8px;">
      ${daysOfWeek.map(d=>`<div style="text-align:center;font-size:10px;font-weight:700;color:var(--text3);padding:4px 0;">${d}</div>`).join('')}
      ${cells}
    </div>
    <div style="display:flex;gap:8px;padding:12px 16px;flex-wrap:wrap;">
      <span style="font-size:11px;color:var(--green);">🟢 Full</span>
      <span style="font-size:11px;color:var(--amber);">🟡 Partial</span>
      <span style="font-size:11px;color:var(--red);">🔴 Skipped</span>
      <span style="font-size:11px;color:var(--text3);">⬜ Missed</span>
    </div>
    <div class="card" style="margin-top:4px;">
      <div style="font-size:11px;font-weight:700;letter-spacing:.8px;color:var(--text3);margin-bottom:8px;">${monthNames[mo-1].toUpperCase()} SUMMARY</div>
      <div style="display:flex;gap:12px;">
        <span style="font-size:13px;color:var(--green);">✅ ${green}</span>
        <span style="font-size:13px;color:var(--amber);">⚡ ${amber}</span>
        <span style="font-size:13px;color:var(--red);">❌ ${red}</span>
        <span style="font-size:13px;color:var(--text3);">— ${miss}</span>
      </div>
    </div>
    <div style="height:16px;"></div>
  `;
}

function calNav(dir){
  const [yr,mo]=state.calendarMonth.split('-').map(Number);
  const d=new Date(yr,mo-1+dir,1);
  state.calendarMonth=d.toISOString().slice(0,7);
  renderCalendar();
}

function openCalDay(ds){
  const log=state.dayLog[ds]||{};
  const j=state.reflections[ds]||{};
  const m=j.morning||{}; const n=j.night||{};
  const done=state.habits.filter(h=>log[h.id]==='done');
  const skip=state.habits.filter(h=>log[h.id]==='skipped');
  const ft=(state.focusSessions.filter(s=>s.date===ds).reduce((a,s)=>a+(s.mins||0),0));
  const dayN=Math.floor((new Date(ds)-new Date(state.startDate))/86400000)+1;
  const moodEmojis=['😔','😐','🙂','😊','🔥'];
  openSheet(`
    <div style="font-size:18px;font-weight:700;margin-bottom:4px;">${ds}</div>
    <div style="font-size:12px;color:var(--gold);margin-bottom:16px;">Day ${dayN} of ${state.challengeDuration}</div>
    <div style="margin-bottom:12px;">
      <div style="font-size:11px;font-weight:700;letter-spacing:.8px;color:var(--text3);margin-bottom:6px;">HABITS</div>
      ${done.map(h=>`<div style="font-size:13px;color:var(--green);margin-bottom:3px;">✓ ${h.emoji} ${h.name}</div>`).join('')}
      ${skip.map(h=>`<div style="font-size:13px;color:var(--red);margin-bottom:3px;">✕ ${h.emoji} ${h.name}</div>`).join('')}
    </div>
    <div style="display:flex;gap:12px;margin-bottom:12px;">
      ${m.mood?`<span style="font-size:16px;">${moodEmojis[m.mood-1]||''}</span>`:''}
      ${ft>0?`<span class="tag tag-gold">⏱ ${ft} min focus</span>`:''}
    </div>
    ${m.intention||n.wentWell?`<div style="font-size:12px;color:var(--text2);font-style:italic;">"${(m.intention||n.wentWell||'').slice(0,80)}"</div>`:''}
    <button class="btn btn-ghost btn-full" style="margin-top:16px;" onclick="closeSheetForce()">Close</button>
  `);
}

    </div>`:''}

    ${rs===3?`<div class="card">
      <div style="font-size:14px;font-weight:700;margin-bottom:10px;">What will you change?</div>
      <textarea class="input textarea" id="rw-change" placeholder="One thing you'll do differently next week..." style="min-height:120px;">${reviewData.change}</textarea>
    </div>`:''}

    ${rs===4?`<div class="card" style="text-align:center;">
      <div style="font-size:48px;margin-bottom:12px;">${wc>=70?'🔥':wc>=40?'💪':'😐'}</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:40px;color:var(--gold);">${wc}%</div>
      <div style="font-size:14px;color:var(--text);margin:8px 0;">${wc>=80?'Outstanding week. You are unstoppable.':wc>=60?'Solid week. Keep building.':wc>=40?'Good effort. Push harder next week.':'Tough week. The comeback starts now.'}</div>
    </div>`:''}

    <div style="padding:0 16px;display:flex;gap:10px;margin-top:8px;">
      ${rs>0?`<button class="btn btn-ghost" style="flex:1;" onclick="reviewStepNav(-1)">← Back</button>`:''}

function reviewStepNav(dir){
  if(dir===1){
    if(reviewStep===1&&document.getElementById('rw-well')) reviewData.wentWell=document.getElementById('rw-well').value;
    if(reviewStep===2&&document.getElementById('rw-fail')) reviewData.failed=document.getElementById('rw-fail').value;
    if(reviewStep===3&&document.getElementById('rw-change')) reviewData.change=document.getElementById('rw-change').value;
    if(reviewStep===4){
      // Save
      state.weeklyReviews[weekNum()]={...reviewData,score:weekCompletion(),date:today()};
      save();
      addXP(50);
      showToast('Week review saved! +50 XP','gold');
      launchConfetti(50);
      reviewStep=0;
      reviewData={wentWell:'',failed:'',change:''};
      renderReview();
      return;
    }
    reviewStep=Math.min(4,reviewStep+1);
  } else {
    reviewStep=Math.max(0,reviewStep-1);
  }
  renderReview();
}

function selectChallenge(id){

  if(m.id==='custom'){
    const days=parseInt(prompt('How many days for your challenge?'))||30;

function confirmChallenge(name, days){
  // Archive current
  state.pastChallenges.push({mode:state.challengeMode,days:state.challengeDuration,dayReached:dayNum(),streak:state.streak,xp:state.xp,endDate:today()});
  state.challengeMode=name;
  state.challengeDuration=days;
  state.startDate=today();
  state.streak=0;
  state.lastDoneDate=null;
  save();
  closeModalForce();
  showToast(`Challenge started: ${name}`,'gold');
  launchConfetti(50);
  goScreen('home');
}

function requestReminder(){
  if('Notification' in window){
    Notification.requestPermission().then(p=>{
      if(p==='granted'){
        showToast('Reminders enabled!','green');
        scheduleReminders();
      } else showToast('Notification permission denied','red');
    });
  } else showToast('Notifications not supported','red');
}

function scheduleReminders(){
  const now=new Date();
  if(state.settings.morningReminder){
    const [h,m]=state.settings.reminderTime.split(':').map(Number);
    const remind=new Date(); remind.setHours(h,m,0,0);
    const delay=remind-now;
    if(delay>0){
      setTimeout(()=>{
        try{ new Notification('LifeRebuild', {body:`🌅 Rise. Day ${dayNum()} of ${state.challengeDuration}. Your mission is waiting.`}); }catch(e){}
      }, delay);
    }
  }
  // FEATURE 7: Per-habit reminders
  const log=getDayLog(today());
  (state.habits||[]).filter(h=>!h.archived&&h.reminderTime).forEach(h=>{
    const status=log[h.id]||'pending';
    if(status!=='pending') return; // already done/skipped
    const [hh,mm]=h.reminderTime.split(':').map(Number);
    const remind=new Date(); remind.setHours(hh,mm,0,0);
    const delay=remind-now;
    if(delay>0){
      setTimeout(()=>{
        const curStatus=(getDayLog(today())||{})[h.id]||'pending';
        if(curStatus!=='pending') return;
        try{ new Notification(`Time for ${h.emoji} ${h.name}`, {body:`Day ${dayNum()} · Tap to open LifeRebuild`}); }catch(e){}
      }, delay);
    }
  });
}

function exportData(){
  const data={...state,generatedAt:new Date().toISOString(),appVersion:APP_VERSION};
  const json=JSON.stringify(data,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`liferebuild-backup-day${dayNum()}-${today()}.json`;
  a.click();
  URL.revokeObjectURL(url);
  state.lastExportDate=today();
  save();
  showToast('Backup exported!','green');
}

function importData(input){
  const file=input.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      const habits=data.habits?.length||0;
      const journals=Object.keys(data.reflections||{}).length;
      const dayN=data.startDate?Math.floor((new Date()-new Date(data.startDate))/86400000)+1:1;
      openModal(`
        <div style="font-size:18px;font-weight:700;margin-bottom:12px;">Import Backup</div>
        <div style="font-size:13px;color:var(--text2);margin-bottom:16px;">This backup is from Day ${dayN}, ${data.generatedAt?.slice(0,10)||'unknown'}.<br>It has <strong>${habits}</strong> habits and <strong>${journals}</strong> journal entries.<br><br>Import will replace all current data.</div>
        <button class="btn btn-gold btn-full" onclick="doImport(${JSON.stringify(data).split('"').join("'")})">IMPORT</button>
        <button class="btn btn-ghost btn-full" style="margin-top:8px;" onclick="closeModalForce()">CANCEL</button>
      `);
    }catch(err){ showToast('Invalid backup file','red'); }
  };
  reader.readAsText(file);
}

function doImport(data){
  // data may be passed as object from JSON
  state=Object.assign(blank(),data);
  save();
  closeModalForce();
  render();
  showToast('Backup restored!','green');
}

function confirmReset(){
  openModal(`
    <div style="font-size:18px;font-weight:700;color:var(--red);margin-bottom:12px;">⚠️ Reset All Data</div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:16px;">This will permanently delete all your habits, journal entries, and progress. This cannot be undone.</div>
    <div><label>Type "RESET" to confirm</label><input class="input" id="reset-confirm" placeholder="RESET"></div>

function doReset(){
  const val=document.getElementById('reset-confirm')?.value;
  if(val!=='RESET'){showToast('Type RESET to confirm','red');return;}
  // Wipe every profile, the active-profile pointer, legacy key, and version flag
  PROFILES.forEach(k=>localStorage.removeItem(k));
  localStorage.removeItem('liferebuild_active_profile');
  localStorage.removeItem('liferebuild_v6');
  localStorage.removeItem('appVersion');
  location.reload();
}

function esc(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function addDays(ds,n){const d=new Date(ds);d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}
function getYesterday(){return addDays(today(),-1);}
function longDate(ds=today()){return new Date(ds+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',day:'numeric',month:'long',year:'numeric'});}
function shortDate(ds){return new Date(ds+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function isPaused(){return !!(state.pausedUntil && today()<=state.pausedUntil);}
function isHabitScheduled(h,date=today()){return !h.archived && (h.scheduleDays||[0,1,2,3,4,5,6]).includes(new Date(date+'T12:00:00').getDay());}
function activeHabitsForDate(date=today()){return (state.habits||[]).filter(h=>isHabitScheduled(h,date));}
function allActiveHabits(){return (state.habits||[]).filter(h=>!h.archived);}
function haptic(pattern){try{navigator.vibrate?.(pattern);}catch(e){}}
function applyTheme(){
  const theme=state.settings?.theme || (state.settings?.dark===false?'light':'dark');
  document.body.classList.toggle('light',theme==='light');
  document.body.classList.toggle('amoled',theme==='amoled');
  state.settings.dark = theme !== 'light';
}
function dayNum(){
  if(!state.startDate) return 1;
  const end = isPaused() && state.pauseStart ? state.pauseStart : today();
  const diff = Math.floor((new Date(end) - new Date(state.startDate)) / 86400000);
  return Math.max(1, diff + 1 - (state.totalPauseDays||0));
}
function todayHabits(){
  const log=getDayLog(today());
  const hs=activeHabitsForDate(today());
  const done=hs.filter(h=>log[h.id]==='done').length;
  const skipped=hs.filter(h=>log[h.id]==='skipped').length;
  return {done,skipped,total:hs.length,pending:Math.max(0,hs.length-done-skipped)};
}
function weekCompletion(){
  let total=0,done=0;
  for(let i=0;i<7;i++){
    const ds=addDays(today(),-i);
    const log=state.dayLog[ds]||{};
    const hs=activeHabitsForDate(ds);
    total+=hs.length;
    done+=hs.filter(h=>log[h.id]==='done').length;
  }
  return total?Math.round(done/total*100):0;
}
function habitWeekPct(habitId){
  const h=state.habits.find(x=>x.id===habitId);
  let total=0,done=0;
  for(let i=0;i<7;i++){
    const ds=addDays(today(),-i);
    if(h && isHabitScheduled(h,ds)){total++; if((state.dayLog[ds]||{})[habitId]==='done') done++;}
  }
  return {done,pct:total?Math.round(done/total*100):0,total};
}
function habitStreak(habitId){
  const h=state.habits.find(x=>x.id===habitId);
  let streak=0;
  for(let i=0;i<370;i++){
    const ds=addDays(today(),-i);
    if(h && !isHabitScheduled(h,ds)) continue;
    if((state.dayLog[ds]||{})[habitId]==='done') streak++; else break;
  }
  return streak;
}
function getStreakMultiplier(){
  if(state.streak>=30) return 3;
  if(state.streak>=14) return 2;
  if(state.streak>=7) return 1.5;
  return 1;
}
function masteryTier(points){

  if(points>=50) return 2;
  if(points>=25) return 1;

}
function tierEmoji(t){return ['','🥉','🥈','🥇','🏆'][t]||'';}
function updateMastery(h){
  if(!h) return {bonus:0,points:0};
  if(!state.habitMastery[h.id]) state.habitMastery[h.id]={points:0,tier:0};
  const m=state.habitMastery[h.id];
  const before=m.tier||0;
  const pts=Math.floor((h.xp||20)/5);
  m.points=Math.min(100,(m.points||0)+pts);
  m.tier=masteryTier(m.points);
  let bonus=0;
  if(m.tier>before){
    bonus=50;
    addXP(50);
    haptic([100,50,100]);
    showToast(`${tierEmoji(m.tier)} ${h.name} reached ${['','Apprentice','Adept','Expert','Master'][m.tier]} tier! +50 XP`,'gold',4500);
    launchConfetti(60);

  return {bonus,points:pts};
}

function toggleHabit(id,action){
  if(isPaused()){showToast('Challenge is paused. Habits resume soon.','gold');return;}
  // FEATURE 2: Check if locked
  const lockTime=(state.dayLockTimes[today()]||{})[id];
  if(lockTime){showToast('This habit is locked for today','');return;}
  clearUndoToast(true);
  const log=getDayLog(today());
  const current=log[id]||'pending';
  const h=state.habits.find(x=>x.id===id);
  let next=current===action?'pending':action;
  let xpAwarded=0, masteryPoints=0, masteryBonus=0;
  if(next==='pending') delete log[id]; else log[id]=next;
  // FEATURE 6: Record completion timestamp
  if(next!=='pending'){
    if(!state.dayLogTimes[today()]) state.dayLogTimes[today()]={};
    state.dayLogTimes[today()][id]=Date.now();
  } else {
    if(state.dayLogTimes[today()]) delete state.dayLogTimes[today()][id];
  }
  if(next==='done' && current!=='done' && h){
    const mult=getStreakMultiplier();
    xpAwarded=Math.round((h.xp||20)*mult);
    addXP(xpAwarded);
    const m=updateMastery(h); masteryPoints=m.points; masteryBonus=m.bonus;
    showToast(`${h.emoji} ${h.name} done! ${h.xp||20} × ${mult}x = +${xpAwarded} XP 🔥`,'green',4200);
    updateStreak(); haptic(50);
    setTimeout(()=>openHabitNoteSheet(id),80);
  } else if(next==='skipped') {
    haptic([20,20,20]); showToast(`${h?.name||'Habit'} marked skipped`,'red');
  } else {
    haptic(20); showToast(`${h?.name||'Habit'} reset`,'');
  }
  state.lastHabitAction={habitId:id,prevStatus:current,date:today(),timestamp:Date.now(),xpAwarded,masteryPoints,masteryBonus};
  state.dayLog[today()]=log;
  const th=todayHabits();
  if(th.total>0 && th.done===th.total){haptic([50,30,50]);showToast('🔥 All habits done! Perfect day!','gold');launchConfetti(60);}
  save();checkBadges();
  // FEATURE 2: Start grace period if action is done/skipped
  if(next==='done'||next==='skipped'){
    startHabitGracePeriod(id, next);
  } else {
    renderScreen(currentScreen);showUndoToast(h?.name||'Habit',next);
  }
}

function habitTouchMove(e,id){

function getStreakBreakDates(){

function dayCompletionColor(ds){
  if(ds>today()) return 'var(--border)';
  const log=state.dayLog[ds]||{}, hs=activeHabitsForDate(ds), done=hs.filter(h=>log[h.id]==='done').length;
  if(!hs.length || (!Object.keys(log).length && ds<today())) return 'var(--bg3)';
  if(done/hs.length>=.7) return 'var(--green)';
  if(done>0) return 'var(--amber)';
  if(hs.length && hs.every(h=>log[h.id]==='skipped')) return 'var(--red)';
  return 'var(--bg3)';
}

function dayOfWeekStats(){
  const names=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const buckets=Array.from({length:7},()=>[]);
  Object.keys(state.dayLog||{}).forEach(ds=>{if(ds>today())return;const hs=activeHabitsForDate(ds),log=state.dayLog[ds]||{};if(!hs.length||!Object.keys(log).length)return;const done=hs.filter(h=>log[h.id]==='done').length;buckets[new Date(ds+'T12:00:00').getDay()].push(done/hs.length);});
  const total=buckets.reduce((a,b)=>a+b.length,0);
  if(total<14) return `<div class="section-label">PERFORMANCE BY DAY</div><div class="grid2"><div class="stat-card"><div class="stat-val">--</div><div class="stat-label">Need 14+ days</div></div><div class="stat-card"><div class="stat-val">--</div><div class="stat-label">Need 14+ days</div></div></div>`;
  const avgs=buckets.map((b,i)=>({i,pct:b.length?Math.round(b.reduce((a,x)=>a+x,0)/b.length*100):0,count:b.length})).filter(x=>x.count);
  const best=[...avgs].sort((a,b)=>b.pct-a.pct)[0], worst=[...avgs].sort((a,b)=>a.pct-b.pct)[0];
  return `<div class="section-label">PERFORMANCE BY DAY</div><div class="grid2"><div class="stat-card"><div style="font-size:14px;color:var(--green);font-weight:800;">Best: ${names[best.i]} (${best.pct}%)</div></div><div class="stat-card"><div style="font-size:14px;color:var(--red);font-weight:800;">Worst: ${names[worst.i]} (${worst.pct}%)</div></div></div><div style="padding:0 16px 12px;font-size:12px;color:var(--text2);">You need extra support on ${names[worst.i]}s. Set a specific trigger for that day.</div>`;
}

function getStreakRuns(){

function xpLeaderboardHtml(){const percentile=calculatePercentile(state.xp), lvl=getLevel(state.xp);return `<div class="card"><div style="font-size:12px;font-weight:900;color:var(--gold);margin-bottom:10px;">YOUR XP RANKING</div>${LEVELS.map(l=>{const done=state.xp>=l.min,cur=l.num===lvl.num;return `<div style="display:flex;align-items:center;gap:8px;padding:8px;border-radius:8px;${cur?'background:rgba(245,197,24,.12);':''};opacity:${done||cur?1:.45}"><span>${done?'✓':cur?'●':'○'}</span><span style="flex:1;font-size:12px;font-weight:700;">LVL ${l.num} · ${l.name}</span><span style="font-size:11px;color:var(--text3);">${done?(state.badges['xp_'+l.num]||'unlocked'):l.min+' XP'}</span></div>`;}).join('')}<div style="font-size:12px;color:var(--text2);margin-top:10px;">You're in the top ${percentile} of users at this stage.</div></div>`;}
function calculatePercentile(xp){if(xp>=3200)return'1%';if(xp>=2500)return'3%';if(xp>=1900)return'7%';if(xp>=1400)return'12%';if(xp>=1000)return'20%';if(xp>=700)return'30%';if(xp>=450)return'40%';if(xp>=250)return'50%';if(xp>=100)return'55%';return'60%';}

function trackedDays(){return Object.keys(state.dayLog||{}).filter(d=>Object.keys(state.dayLog[d]||{}).length).length;}
function detectPatterns(){
  if(trackedDays()<14) return [];
  const patterns=[], names=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  allActiveHabits().forEach(h=>{for(let dow=0;dow<7;dow++){let total=0,skip=0;Object.entries(state.dayLog).forEach(([ds,log])=>{if(new Date(ds+'T12:00:00').getDay()===dow && isHabitScheduled(h,ds)){if(log[h.id])total++;if(log[h.id]==='skipped')skip++;}});if(total>=3&&skip/total>=.6)patterns.push({key:`skip-${h.id}-${dow}`,type:'dow',emoji:'⚠️',confidence:skip/total,insight:`You skip ${h.name} most on ${names[dow]}s (${skip} of ${total} weeks).`});}});
  const moodsByFocus={hi:[],lo:[]};Object.keys(state.reflections).forEach(ds=>{const r=state.reflections[ds]||{}, mood=r.night?.mood||r.morning?.mood;if(!mood)return;const f=state.focusSessions.filter(s=>s.date===ds).reduce((a,s)=>a+(s.mins||0),0);if(f>=45)moodsByFocus.hi.push(mood);if(f<15)moodsByFocus.lo.push(mood);});
  const avg=a=>a.length?a.reduce((x,y)=>x+y,0)/a.length:0; if(moodsByFocus.hi.length>=3&&moodsByFocus.lo.length>=3&&avg(moodsByFocus.hi)-avg(moodsByFocus.lo)>=1)patterns.push({key:'focus-mood',type:'focus',emoji:'🎯',confidence:avg(moodsByFocus.hi)-avg(moodsByFocus.lo),insight:`On 45+ min focus days, your mood averages ${avg(moodsByFocus.hi).toFixed(1)}/5. On low-focus days: ${avg(moodsByFocus.lo).toFixed(1)}/5.`});
  const hs=allActiveHabits(); for(let i=0;i<hs.length;i++)for(let j=i+1;j<hs.length;j++){let both=0,aDone=0;Object.values(state.dayLog).forEach(log=>{if(log[hs[i].id]==='done'){aDone++;if(log[hs[j].id]==='done')both++;}});if(aDone>=7&&both/aDone>=.75)patterns.push({key:`corr-${hs[i].id}-${hs[j].id}`,type:'corr',emoji:'🔗',confidence:both/aDone,insight:`When you complete ${hs[i].name}, you complete ${hs[j].name} ${Math.round(both/aDone*100)}% of the time.`});}
  const breaks=getStreakBreakDates(); if(breaks.length>=3){const b=Array(7).fill(0);breaks.forEach(ds=>b[new Date(ds+'T12:00:00').getDay()]++);const max=Math.max(...b),dow=b.indexOf(max);if(max/breaks.length>=.4)patterns.push({key:`break-${dow}`,type:'break',emoji:'🧱',confidence:max/breaks.length,insight:`You break streaks most often on ${names[dow]}s. Plan ahead for that day.`});}
  let morn={d:0,t:0}, eve={d:0,t:0};hs.forEach(h=>{Object.entries(state.dayLog).forEach(([ds,log])=>{if(!isHabitScheduled(h,ds))return;if(h.area==='morning'){morn.t++;if(log[h.id]==='done')morn.d++;}if(h.area==='evening'){eve.t++;if(log[h.id]==='done')eve.d++;}});});if(morn.t>=5&&eve.t>=5)patterns.push({key:'morning-evening',type:'time',emoji:'🌗',confidence:Math.abs(morn.d/morn.t-eve.d/eve.t),insight:`Your morning habits succeed ${Math.round(morn.d/morn.t*100)}% vs evening habits ${Math.round(eve.d/eve.t*100)}%. Shift weak habits earlier.`});
  return patterns.filter(p=>!state.dismissedPatterns[p.key]).sort((a,b)=>b.confidence-a.confidence).slice(0,4);
}
function dismissPattern(key){state.dismissedPatterns[key]=true;save();renderCoach();}
function generateHabitSuggestions(){
  const goal=state.profile?.goal||'Discipline', defs=GOAL_SUGGESTIONS[goal]||GOAL_SUGGESTIONS.Discipline, names=state.habits.map(h=>h.name.toLowerCase());

}
function addSuggestedHabit(name){

  state.habits.push({id:uid(),emoji:s.emoji,name:s.name,area:'morning',xp:20,scheduleDays:[0,1,2,3,4,5,6],tags:['#discipline'],archived:false});save();showToast(`${s.name} added`,'green');renderCoach();
}
function dismissSuggestion(name){state.dismissedSuggestions.push(name);save();renderCoach();}
function weekRange(wn){const s=addDays(state.startDate,(wn-1)*7);return {start:s,end:addDays(s,6)};}
function weekHabitPct(wn){const r=weekRange(wn);let total=0,done=0;for(let ds=r.start;ds<=r.end;ds=addDays(ds,1)){const hs=activeHabitsForDate(ds),log=state.dayLog[ds]||{};total+=hs.length;done+=hs.filter(h=>log[h.id]==='done').length;}return total?Math.round(done/total*100):0;}
function generateWeeklySummary(wn=weekNum()){
  const r=weekRange(wn), pct=weekHabitPct(wn), last=weekHabitPct(wn-1), dir=pct>=last?'up':'down', diff=Math.abs(pct-last);
  const stats=allActiveHabits().map(h=>{let d=0;for(let ds=r.start;ds<=r.end;ds=addDays(ds,1))if((state.dayLog[ds]||{})[h.id]==='done')d++;return{h,d};}).sort((a,b)=>b.d-a.d);
  const strong=stats[0], weak=stats[stats.length-1];
  let mood=0,energy=0,mc=0,ec=0,jc=0;for(let ds=r.start;ds<=r.end;ds=addDays(ds,1)){const ref=state.reflections[ds]||{};if(ref.morning||ref.night)jc++;const m=ref.night?.mood||ref.morning?.mood;if(m){mood+=m;mc++;}if(ref.morning?.energy){energy+=ref.morning.energy;ec++;}}

  const txt=`Week ${wn} Summary — ${shortDate(r.start)} to ${shortDate(r.end)}

HABITS: You completed ${pct}% of your habits this week (vs ${last}% last week, ${dir} ${diff}pp).
Your strongest habit: ${strong?strong.h.name:'None'} (${strong?strong.d:0}/7 days). Your weakest: ${weak?weak.h.name:'None'} (${weak?weak.d:0}/7 days).
${weak&&weak.d<3?weak.h.name+' needs attention — complete it first each day.':''}

${focus>=90?'Strong focus week.':focus<45?'Focus was below target. Book your sessions in advance.':''}

JOURNAL: ${jc} entries this week. ${jc>=7?'Perfect journaling week.':jc<3?'More reflection = more clarity.':''}

NEXT WEEK: Protect the weakest habit and schedule focus before the day gets noisy.`;
  state.weeklySummaries[wn]=txt;save();return txt;
}

function handleJournalPhoto(type,input){const file=input.files?.[0];if(!file)return;const reader=new FileReader();reader.onload=e=>{const img=new Image();img.onload=()=>{const max=600,scale=Math.min(1,max/img.width),canvas=document.createElement('canvas');canvas.width=Math.round(img.width*scale);canvas.height=Math.round(img.height*scale);canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);const data=canvas.toDataURL('image/jpeg',.7);if(!state.reflections[today()])state.reflections[today()]={};if(!state.reflections[today()][type])state.reflections[today()][type]={};state.reflections[today()][type].photo=data;save();renderJournal();};img.src=e.target.result;};reader.readAsDataURL(file);}

function createNoise(ctx,type){const bufferSize=4096,node=ctx.createScriptProcessor(bufferSize,1,1),gain=ctx.createGain(),filter=ctx.createBiquadFilter();let last=0;node.onaudioprocess=e=>{const data=e.outputBuffer.getChannelData(0);for(let i=0;i<bufferSize;i++){let v=Math.random()*2-1;if(type==='brown'){last=(last+.02*v)/1.02;v=last*3.5;}data[i]=v;}};filter.type=type==='rain'?'bandpass':type==='brown'?'lowpass':'allpass';filter.frequency.value=type==='rain'?400:600;filter.Q.value=.7;gain.gain.value=(state.settings.ambientVolume||35)/100;node.connect(filter);filter.connect(gain);gain.connect(ctx.destination);return{node,filter,gain};}
