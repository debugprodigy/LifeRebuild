function pinPress(n){if(Date.now()<pinLockedUntil)return;if(n==='⌫')pinInput=pinInput.slice(0,-1);else if(n!=='')pinInput=(pinInput+n).slice(0,4);[0,1,2,3].forEach(i=>document.getElementById('pin-dot-'+i)?.classList.toggle('filled',i<pinInput.length));if(pinInput.length===4){if(obfuscatePin(pinInput)===state.settings.pin){document.getElementById('pin-lock-overlay').classList.remove('show');pinAttempts=0;}else{pinAttempts++;pinInput='';haptic([50,30,50,30,50]);const o=document.getElementById('pin-lock-overlay');o.classList.add('pin-shake');setTimeout(()=>o.classList.remove('pin-shake'),260);document.getElementById('pin-msg').textContent=pinAttempts>=5?'Too many attempts — wait 30 seconds':'Incorrect PIN';if(pinAttempts>=5)pinLockedUntil=Date.now()+30000;[0,1,2,3].forEach(i=>document.getElementById('pin-dot-'+i)?.classList.remove('filled'));}}}

async function deriveKey(password){const enc=new TextEncoder(),mat=await crypto.subtle.importKey('raw',enc.encode(password),'PBKDF2',false,['deriveKey']);return crypto.subtle.deriveKey({name:'PBKDF2',salt:enc.encode('liferebuild_salt_v6'),iterations:100000,hash:'SHA-256'},mat,{name:'AES-GCM',length:128},false,['encrypt','decrypt']);}
async function encryptJournal(data,password){const enc=new TextEncoder(),iv=crypto.getRandomValues(new Uint8Array(12)),key=await deriveKey(password),buf=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,enc.encode(JSON.stringify(data)));return {iv:Array.from(iv),data:btoa(String.fromCharCode(...new Uint8Array(buf)))};}
async function decryptJournal(data,password){const dec=new TextDecoder(),key=await deriveKey(password),raw=Uint8Array.from(atob(data.data),c=>c.charCodeAt(0)),buf=await crypto.subtle.decrypt({name:'AES-GCM',iv:new Uint8Array(data.iv)},key,raw);return JSON.parse(dec.decode(buf));}
async function toggleEncryption(on){if(on){const p=prompt('Create a journal password. If you forget it, entries cannot be recovered.');if(!p){renderSettings();return;}journalPassword=p;state.encryptedJournal=await encryptJournal(state.reflections,p);state.settings.encrypted=true;journalUnlocked=true;save();showToast('Journal encryption enabled','gold');}else{state.settings.encrypted=false;state.encryptedJournal={};journalUnlocked=true;save();}renderSettings();}
async function persistEncryptedJournal(){if(state.settings.encrypted&&journalPassword){state.encryptedJournal=await encryptJournal(state.reflections,journalPassword);save();}}
async function promptJournalPassword(){const p=prompt('Journal password');try{state.reflections=await decryptJournal(state.encryptedJournal,p);journalPassword=p;journalUnlocked=true;renderJournal();}catch(e){showToast('Incorrect password','red');}}

function drawInviteCode(url){const c=document.getElementById('invite-qr');if(!c)return;const ctx=c.getContext('2d'),n=21,s=8;ctx.fillStyle='#fff';ctx.fillRect(0,0,180,180);ctx.fillStyle='#000';for(let y=0;y<n;y++)for(let x=0;x<n;x++){const v=(url.charCodeAt((x*y+x+y)%url.length)+x*13+y*7)%5;if(v<2)ctx.fillRect(6+x*s,6+y*s,s-1,s-1);}ctx.fillRect(6,6,40,40);ctx.fillRect(134,6,40,40);ctx.fillRect(6,134,40,40);}

function getTimelineMilestones(duration){
  // Build dynamic milestones that fit any challenge length
  const m={};
  const quarter=Math.round(duration/4), half=Math.round(duration/2), threeQ=Math.round(duration*3/4);
  if(duration>=7) m[7]='🔥 First week. The hardest one.';
  if(duration>=14) m[14]='💪 Two weeks. You\'re building real momentum.';
  if(duration>=21) m[21]='🧠 21 days. Your brain is rewiring.';
  if(duration>=30) m[30]='📅 One month. You\'re different now.';
  if(quarter>7 && quarter!==14 && quarter!==21 && quarter!==30) m[quarter]=`⚡ ${quarter} days — 25% complete.`;
  if(half>30 && half!==66) m[half]=`🎯 Halfway. Most quit here. You didn\'t.`;
  if(duration>=66) m[66]='🏅 66-Day Club. You\'re automatic now.';
  if(threeQ>half && threeQ!==66 && threeQ<duration) m[threeQ]=`🚀 75% done. The end is real.`;
  if(duration>=90) m[90]='🏆 90-Day Arc complete. Legendary.';
  if(duration!==90) m[duration]=`🏆 Day ${duration}. Challenge complete. LEGENDARY.`;
  // Merge with any static milestones defined in TIMELINE_MILESTONES
  return Object.assign({},TIMELINE_MILESTONES,m);
}

function getPhases(duration){
  // Create named phases that scale to the challenge length
  if(duration<=7) return [{start:1,end:duration,label:'THE CHALLENGE',color:'var(--gold)'}];
  if(duration<=14) return [{start:1,end:7,label:'WEEK 1 · IGNITION',color:'var(--gold)'},{start:8,end:duration,label:'WEEK 2 · MOMENTUM',color:'var(--green)'}];
  if(duration<=30) return [
    {start:1,end:7,label:'WEEK 1 · IGNITION',color:'var(--gold)'},
    {start:8,end:14,label:'WEEK 2 · MOMENTUM',color:'var(--amber)'},
    {start:15,end:21,label:'WEEK 3 · DISCIPLINE',color:'var(--green)'},
    {start:22,end:duration,label:'FINAL PUSH · PROVE IT',color:'#a855f7'}
  ];
  const q=Math.round(duration/4);
  return [
    {start:1,end:q,label:'PHASE 1 · IGNITION',color:'var(--gold)'},
    {start:q+1,end:q*2,label:'PHASE 2 · BUILD',color:'var(--amber)'},
    {start:q*2+1,end:q*3,label:'PHASE 3 · FORGE',color:'var(--green)'},
    {start:q*3+1,end:duration,label:'PHASE 4 · ASCEND',color:'#a855f7'}
  ];
}

function renderTimeline(){
  const el=document.getElementById('screen-timeline');
  const day=dayNum(), dur=state.challengeDuration;
  const milestones=getTimelineMilestones(dur);
  const phases=getPhases(dur);
  const pastDays=Object.keys(state.dayLog||{}).filter(d=>d<=today()).length;
  const doneTotal=Object.values(state.dayLog||{}).reduce((a,log)=>a+Object.values(log).filter(v=>v==='done').length,0);

      <div style="font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--text);">${doneTotal}</div>
      <div style="font-size:9px;font-weight:700;letter-spacing:.8px;color:var(--text3);">HABITS ✓</div>
    </div>
  </div>`;

  // Full progress bar
  const fullBar=`<div style="padding:4px 16px 12px;">
    <div style="background:var(--bg3);border-radius:6px;height:8px;overflow:hidden;position:relative;">
      <div style="height:100%;border-radius:6px;background:linear-gradient(90deg,var(--gold),var(--green));width:${pct}%;transition:width .6s ease;"></div>
    </div>
    <div style="display:flex;justify-content:space-between;margin-top:4px;font-size:10px;color:var(--text3);"><span>Day 1</span><span>Day ${dur}</span></div>
  </div>`;

  // Jump to today button
  const jumpBtn=`<button onclick="document.getElementById('tl-today').scrollIntoView({behavior:'smooth',block:'center'})" style="position:sticky;top:8px;z-index:10;float:right;margin-right:16px;background:var(--gold);color:#000;border:none;border-radius:20px;padding:6px 14px;font-size:11px;font-weight:800;cursor:pointer;box-shadow:0 2px 12px rgba(245,197,24,.4);">TODAY ↓</button><div style="clear:both;"></div>`;

  // Build nodes grouped by phase

  for(let i=1;i<=dur;i++){

    }

    } else {

      if(hs.length){
        nodes+=`<div class="mini-segments" style="margin:6px 0 8px;">${hs.map(h=>`<span style="background:${log[h.id]==='done'?'var(--green)':log[h.id]==='skipped'?'var(--red)':'var(--bg3)'}"></span>`).join('')}</div>`;

    }

    if(phase && i===phase.end && phaseIdx<phases.length-1) phaseIdx++;
  }

// FEATURE 2: HABIT STATE LOCKING (30-second grace period)
// ═══════════════════════════════════════════════════════════════════════════════
const habitGraceTimers={};

function startHabitGracePeriod(id, status){
  const actionTime=Date.now();
  // If previously closed mid-grace, check remaining
  const elapsed=0; // fresh action
  let remaining=30;
  clearGraceTimer(id);
  renderScreen(currentScreen);
  showUndoToast(state.habits.find(h=>h.id===id)?.name||'Habit', status);
  function tick(){
    remaining--;
    const cdEl=document.getElementById('grace-cd-'+id);
    if(cdEl) cdEl.textContent=`Locks in ${remaining}s`;
    if(remaining<=0){
      lockHabit(id);
    } else {
      habitGraceTimers[id]=setTimeout(tick,1000);
    }
  }
  habitGraceTimers[id]=setTimeout(tick,1000);
}

function clearGraceTimer(id){
  if(habitGraceTimers[id]){clearTimeout(habitGraceTimers[id]);delete habitGraceTimers[id];}
}

function lockHabit(id){
  if(!state.dayLockTimes[today()]) state.dayLockTimes[today()]={};
  state.dayLockTimes[today()][id]=Date.now();
  clearGraceTimer(id);
  clearUndoToast(true);
  save();
  renderScreen(currentScreen);
}

function undoHabitGrace(id){
  clearGraceTimer(id);
  clearUndoToast(true);
  const log=getDayLog(today());
  const a=state.lastHabitAction;
  if(a&&a.habitId===id){
    if(a.prevStatus==='pending') delete log[a.habitId]; else log[a.habitId]=a.prevStatus;
    if(a.xpAwarded) state.xp=Math.max(0,state.xp-a.xpAwarded-a.masteryBonus);
    if(a.masteryPoints&&state.habitMastery[id]){state.habitMastery[id].points=Math.max(0,state.habitMastery[id].points-a.masteryPoints);recalcMastery(id);}
    state.lastHabitAction=null;
    if(state.dayLogTimes[today()]) delete state.dayLogTimes[today()][id];
  } else {
    delete log[id];
    if(state.dayLogTimes[today()]) delete state.dayLogTimes[today()][id];
  }
  save();renderScreen(currentScreen);showToast('Habit action undone','gold');
}

function habitActionButtons(id, status){
  // Check if locked
  const lockTime=(state.dayLockTimes[today()]||{})[id];
  if(lockTime){
    const t=new Date(lockTime).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
    return `<div class="hab-btn-locked" title="${status==='done'?'Completed':'Skipped'} at ${t} — locked">🔒</div>`;
  }
  // Check if in grace period (timer running)
  if(habitGraceTimers[id]){
    return `<div style="display:flex;flex-direction:column;align-items:center;gap:2px;">
      <div id="grace-cd-${id}" class="hab-countdown">Locks in 30s</div>
      <div class="hab-btn hab-btn-undo" onclick="event.stopPropagation();undoHabitGrace('${id}')">↩</div>
    </div>`;
  }
  // Normal buttons
  return `<div class="hab-btn ${status==='done'?'done-btn':''}" onclick="toggleHabit('${id}','done')">✓</div>
    <div class="hab-btn ${status==='skipped'?'skip-btn':''}" onclick="toggleHabit('${id}','skipped')">✕</div>`;
}

// On app load: check for mid-grace sessions and lock if needed
function checkHabitLockStates(){
  const log=getDayLog(today());
  Object.entries(log).forEach(([id,status])=>{
    if(status!=='done'&&status!=='skipped') return;
    const lockTime=(state.dayLockTimes[today()]||{})[id];
    if(lockTime) return; // already locked
    // Check if there's a logTime for this habit today
    const logTime=(state.dayLogTimes[today()]||{})[id];
    if(!logTime) return;
    const elapsed=(Date.now()-logTime)/1000;
    if(elapsed>=30){
      // Lock now
      if(!state.dayLockTimes[today()]) state.dayLockTimes[today()]={};
      state.dayLockTimes[today()][id]=logTime+30000;
    } else {
      // Resume countdown
      let remaining=Math.ceil(30-elapsed);
      function tick(){
        remaining--;
        const cdEl=document.getElementById('grace-cd-'+id);
        if(cdEl) cdEl.textContent=`Locks in ${remaining}s`;
        if(remaining<=0) lockHabit(id);
        else habitGraceTimers[id]=setTimeout(tick,1000);
      }
      habitGraceTimers[id]=setTimeout(tick,1000);
    }
  });
  save();
}

function exportExcel(){
  const btn=document.getElementById('excel-export-btn');

  const script=document.createElement('script');
  script.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
  script.onload=()=>doExcelExport(btn);
  script.onerror=()=>{showToast('Failed to load Excel library','red');if(btn){btn.textContent='📊 Export to Excel';btn.disabled=false;}};
  document.head.appendChild(script);

function doExcelExport(btn){
  try{
    const wb=XLSX.utils.book_new();
    // Sheet 1: Daily Habit Log
    const dates=[];
    const start=new Date(state.startDate||today());
    const end=new Date(today());
    for(let d=new Date(start);d<=end;d.setDate(d.getDate()+1)) dates.push(d.toISOString().slice(0,10));
    const habitHeaders=['Date','Day #',...state.habits.map(h=>h.name),'Total Done','Total Habits','Completion %'];
    const habitData=dates.map(ds=>{
      const log=state.dayLog[ds]||{};
      const dayN=Math.floor((new Date(ds)-start)/86400000)+1;
      const cells=[ds,dayN,...state.habits.map(h=>log[h.id]==='done'?'Done':log[h.id]==='skipped'?'Skipped':'—')];
      const done=state.habits.filter(h=>log[h.id]==='done').length;
      cells.push(done,state.habits.length,state.habits.length?Math.round(done/state.habits.length*100)+'%':'0%');
      return cells;
    });
    const ws1=XLSX.utils.aoa_to_sheet([habitHeaders,...habitData]);
    XLSX.utils.book_append_sheet(wb,ws1,'Daily Habit Log');

    // Sheet 2: Habit Summary
    const sumHeaders=['Habit','Emoji','Area','XP','Total Done','Total Skipped','Consistency %','Current Streak','Best Streak'];
    const sumData=state.habits.map(h=>{
      let done=0,skip=0;
      Object.values(state.dayLog).forEach(l=>{if(l[h.id]==='done')done++;else if(l[h.id]==='skipped')skip++;});
      const total=done+skip;
      return [h.name,h.emoji,h.area,h.xp,done,skip,total?Math.round(done/total*100)+'%':'0%',habitStreak(h.id),habitBestStreak(h.id)];
    });
    const ws2=XLSX.utils.aoa_to_sheet([sumHeaders,...sumData]);
    XLSX.utils.book_append_sheet(wb,ws2,'Habit Summary');

    // Sheet 3: Journal Entries
    const jHeaders=['Date','Morning Intention','One Task','Grateful','Morning Mood','Energy','Sleep Quality','Night: Went Well','Improve','Gratitude','Night Mood'];
    const jData=Object.entries(state.reflections).sort((a,b)=>a[0].localeCompare(b[0])).map(([ds,r])=>{
      const m=r.morning||{},n=r.night||{};
      return [ds,m.intention||'',m.oneTask||'',m.grateful||'',m.mood||'',m.energy||'',m.sleepQuality||'',n.wentWell||'',n.improve||'',n.gratitude||'',n.mood||''];
    });
    const ws3=XLSX.utils.aoa_to_sheet([jHeaders,...jData]);
    XLSX.utils.book_append_sheet(wb,ws3,'Journal Entries');

    // Sheet 4: Focus Sessions
    const fHeaders=['Date','Duration (min)','Task','Completed At'];
    const fData=[...state.focusSessions].sort((a,b)=>b.date?.localeCompare(a.date||'')).map(s=>[s.date||'',s.mins||s.duration||0,s.task||'',s.completedAt?new Date(s.completedAt).toLocaleString():'']);
    const ws4=XLSX.utils.aoa_to_sheet([fHeaders,...fData]);
    XLSX.utils.book_append_sheet(wb,ws4,'Focus Sessions');

    // Sheet 5: Overview
    const ovHeaders=['Total XP','Current Streak','Challenge Day','Rise Score','Habits Count','Journal Entries','Focus Sessions','Books Read'];
    const ovData=[[state.xp,state.streak,dayNum(),riseScore(),state.habits.length,journalCount(),state.focusSessions.length,state.books.length]];
    const ws5=XLSX.utils.aoa_to_sheet([ovHeaders,...ovData]);
    XLSX.utils.book_append_sheet(wb,ws5,'Overview');

    XLSX.writeFile(wb,`liferebuild-export-${today()}.xlsx`);
    state.lastExportDate=today();save();
    showToast('✓ Excel file exported','green');
  } catch(e){showToast('Export failed: '+e.message,'red');}
  if(btn){btn.textContent='📊 Export to Excel';btn.disabled=false;}
}

// FEATURE 5: MOOD TRENDS CHART (SVG only, in Reports)
// ═══════════════════════════════════════════════════════════════════════════════
function moodTrendsChartHtml(){
  const moodEmojis=['','😔','😐','🙂','😊','🔥'];
  // 30-day mood sparkline
  const data30=[];
  for(let i=29;i>=0;i--){
    const ds=addDays(today(),-i);
    const r=state.reflections[ds]||{};
    const moods=[r.morning?.mood,r.night?.mood].filter(Boolean);
    const avg=moods.length?moods.reduce((a,b)=>a+b,0)/moods.length:null;
    data30.push({ds,avg});
  }
  const hasMoodData=data30.filter(d=>d.avg).length>=3;

  // 14-day habit vs mood
  const data14=[];
  for(let i=13;i>=0;i--){
    const ds=addDays(today(),-i);
    const r=state.reflections[ds]||{};
    const mood=r.morning?.mood||r.night?.mood;
    const log=state.dayLog[ds]||{};
    const hs=activeHabitsForDate(ds);
    const pct=hs.length?hs.filter(h=>log[h.id]==='done').length/hs.length:null;
    data14.push({ds,mood,pct});
  }
  const hasInsightData=data14.filter(d=>d.mood&&d.pct!==null).length>=7;

  // Insight calculation
  let insightText='Keep journaling to unlock mood insights';
  if(hasInsightData){
    const fullDays=data14.filter(d=>d.pct===1&&d.mood);
    const notFullDays=data14.filter(d=>d.pct!==null&&d.pct<1&&d.mood);
    if(fullDays.length>=2&&notFullDays.length>=2){
      const avgFull=fullDays.reduce((a,d)=>a+d.mood,0)/fullDays.length;
      const avgNot=notFullDays.reduce((a,d)=>a+d.mood,0)/notFullDays.length;
      const diff=Math.round((avgFull-avgNot)/avgNot*100);
      insightText=diff>0?`Your mood is ${diff}% higher on days you complete all habits`:`Mood patterns are still forming — keep tracking`;
    }
  }

  // Compute 30-day avg
  const moodValues=data30.filter(d=>d.avg).map(d=>d.avg);
  const avg30=moodValues.length?(moodValues.reduce((a,b)=>a+b,0)/moodValues.length).toFixed(1):null;

  if(!hasMoodData) return `<div class="section-label">MOOD TRENDS</div><div class="v6-chart"><div style="font-size:13px;color:var(--text3);text-align:center;padding:20px 0;">Journal for 3+ days to see mood trends</div></div>`;

  // Build sparkline SVG points
  const W=280,H=80,PAD=10;
  const pts30=data30.map((d,i)=>{
    if(d.avg===null) return null;
    const x=PAD+i*(W/(data30.length-1));
    const y=H-PAD-(d.avg-1)/(5-1)*(H-PAD*2);
    return {x,y,ds:d.ds,avg:d.avg};
  });
  // Build polyline segments (break on null)
  let segs='',prevPt=null;
  pts30.forEach(p=>{
    if(!p){prevPt=null;return;}
    if(prevPt){
      const col=p.avg>=4?'var(--green)':p.avg>=3?'var(--gold)':'var(--red)';
      segs+=`<line x1="${prevPt.x}" y1="${prevPt.y}" x2="${p.x}" y2="${p.y}" stroke="${col}" stroke-width="2" stroke-linecap="round"/>`;
    }
    prevPt=p;
  });
  const dots=pts30.filter(Boolean).map(p=>`<text x="${p.x}" y="${p.y-4}" text-anchor="middle" font-size="9">${moodEmojis[Math.round(p.avg)]}</text>`).join('');

  // 14-day bar chart
  const barW=14,barGap=6,totalW=14*(barW+barGap);
  const bars=data14.map((d,i)=>{
    const x=i*(barW+barGap);
    const habitH=d.pct!==null?Math.max(3,d.pct*60):0;
    const moodH=d.mood?Math.max(3,(d.mood/5)*60):0;
    const dayLbl=new Date(d.ds+'T12:00:00').toLocaleDateString('en-US',{weekday:'short'}).charAt(0);
    return `<rect x="${x}" y="${70-habitH}" width="${barW*0.45}" height="${habitH}" rx="3" fill="var(--gold)" opacity=".85"/>
      <rect x="${x+barW*0.52}" y="${70-moodH}" width="${barW*0.45}" height="${moodH}" rx="3" fill="var(--green)" opacity=".85"/>
      <text x="${x+barW/2}" y="82" text-anchor="middle" font-size="8" fill="var(--text3)">${dayLbl}</text>`;
  }).join('');

  return `<div class="section-label">MOOD TRENDS (30 DAYS)</div>
  <div class="v6-chart">
    <svg width="100%" viewBox="0 0 ${W+PAD} ${H+10}" preserveAspectRatio="xMidYMid meet">
      ${segs}${dots}
      <text x="4" y="14" font-size="8" fill="var(--text3)">5</text>
      <text x="4" y="${H-PAD+4}" font-size="8" fill="var(--text3)">1</text>
    </svg>
    ${avg30?`<div style="text-align:center;font-size:12px;color:var(--text2);margin-top:6px;">30-day average mood: <strong style="color:var(--gold);">${avg30}/5</strong></div>`:''}
    <div style="display:flex;gap:12px;justify-content:center;font-size:10px;color:var(--text2);margin-top:4px;"><span style="color:var(--green);">● ≥4</span><span style="color:var(--gold);">● ≥3</span><span style="color:var(--red);">● <3</span></div>
  </div>
  <div class="section-label">HABITS VS MOOD (14 DAYS)</div>
  <div class="v6-chart">
    <svg width="100%" viewBox="0 0 ${totalW+10} 90" preserveAspectRatio="xMidYMid meet">
      ${bars}
    </svg>
    <div style="display:flex;gap:12px;justify-content:center;font-size:10px;color:var(--text2);margin-top:2px;"><span style="color:var(--gold);">■ Habits</span><span style="color:var(--green);">■ Mood</span></div>
    <div style="font-size:12px;color:var(--text2);text-align:center;margin-top:8px;">${insightText}</div>
  </div>`;
}

// FEATURE 6: HABIT COMPLETION TIMESTAMP — time pattern UI
// ═══════════════════════════════════════════════════════════════════════════════
function habitTimePatternHtml(id){
  const times=[];
  Object.entries(state.dayLogTimes||{}).forEach(([ds,logT])=>{
    if(logT[id] && (state.dayLog[ds]||{})[id]==='done') times.push(new Date(logT[id]));
  });
  if(times.length<5) return `<div style="font-size:12px;color:var(--text3);margin-bottom:14px;">Complete this habit 5+ times to see your time pattern</div>`;

  const hours=times.map(t=>t.getHours());
  const hourCounts=Array(24).fill(0);
  hours.forEach(h=>hourCounts[h]++);
  const maxH=Math.max(...hourCounts,1);

  // Find most common hour range
  let best=-1,bestCount=0;
  for(let h=0;h<24;h++){if(hourCounts[h]>bestCount){bestCount=hourCounts[h];best=h;}}
  const ampm=h=>h<12?(h===0?'12 AM':`${h} AM`):(h===12?'12 PM':`${h-12} PM`);
  const usualLabel=best>=0?`Usually done at ${ampm(best)}–${ampm(best+1<24?best+1:0)}`:'';

  // SVG strip
  const W=280,H=30;
  const bars=hourCounts.map((c,h)=>{
    const x=h*(W/24);
    const bh=c?Math.max(4,c/maxH*H):0;
    return `<rect x="${x}" y="${H-bh}" width="${W/24-1}" height="${bh}" rx="1" fill="${c?'var(--green)':'var(--bg3)'}"/>`;
  }).join('');
  const labels=[0,6,12,18,23].map(h=>`<text x="${h*(W/24)}" y="${H+12}" font-size="7" fill="var(--text3)">${h}h</text>`).join('');

  return `<div style="margin-bottom:14px;">
    <div class="xp-label" style="margin-bottom:8px;">COMPLETION TIME PATTERN</div>
    <svg width="100%" viewBox="0 0 ${W} ${H+14}" preserveAspectRatio="none">${bars}${labels}</svg>
    ${usualLabel?`<div style="font-size:11px;color:var(--text2);margin-top:6px;">⏰ ${usualLabel}</div>`:''}
  </div>`;
}

// FEATURE 8: WATER INTAKE TRACKER
// ═══════════════════════════════════════════════════════════════════════════════
function waterToday(){return state.waterLog[today()]||0;}

function setWater(n){
  const goal=state.waterGoal||8;
  const prev=waterToday();
  const newVal=Math.max(0,Math.min(goal+4,n));
  state.waterLog[today()]=newVal;
  // XP: 5 per new glass, max 40/day
  const already=state.waterXpAwarded[today()]||0;
  if(newVal>prev){
    const newGlasses=newVal-prev;
    const xpCan=Math.max(0,40-already);
    const xpGive=Math.min(newGlasses*5,xpCan);
    if(xpGive>0){addXP(xpGive);state.waterXpAwarded[today()]=(already+xpGive);}
  }
  save();
  // Check badge
  checkWaterBadge();
  haptic(30);
  // Re-render whichever screen is currently active
  renderScreen(currentScreen);
}

function checkWaterBadge(){
  let streak=0;
  for(let i=0;i<7;i++){
    const ds=addDays(today(),-i);
    if((state.waterLog[ds]||0)>=(state.waterGoal||8)) streak++;
    else break;
  }
  if(streak>=7){
    const v6check=checkBadges;
    if(!state.badges['hydration_7']){
      state.badges['hydration_7']=today();
      if(!state.badgeXpAwarded['hydration_7']){
        state.badgeXpAwarded['hydration_7']=true;addXP(100);
        showToast('💧 Badge: Hydration Hero! +100 XP','gold');launchConfetti(40);
      }
      save();
    }
  }
}

// FEATURE 9: HABIT TEMPLATE LIBRARY
// ═══════════════════════════════════════════════════════════════════════════════
let expandedPack=null;

function renderTemplates(){
  const el=document.getElementById('screen-templates');
  let html=`<div class="screen-header"><button class="back-btn" onclick="goBack()">←</button><div class="screen-title">Habit Templates</div></div>
  <div style="padding:8px 16px 12px;font-size:13px;color:var(--text2);">Import habit packs to kickstart your routine. Duplicates are skipped automatically.</div>`;

  // User templates first
  if(state.userTemplates&&state.userTemplates.length){
    html+=`<div class="section-label">MY TEMPLATES</div>`;
    state.userTemplates.forEach((tpl,idx)=>{
      html+=`<div class="card" style="padding:14px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
          <div><div style="font-size:15px;font-weight:800;">📁 ${esc(tpl.name)}</div><div style="font-size:11px;color:var(--text3);">${tpl.habits.length} habits</div></div>
          <button class="btn btn-danger" style="padding:8px 12px;font-size:11px;" onclick="deleteUserTemplate(${idx})">🗑</button>
        </div>
        <button class="btn btn-gold btn-full" onclick="importTemplatePack(${JSON.stringify(tpl).replace(/"/g,'&quot;')})">Import All</button>
      </div>`;
    });
  }

  html+=`<div class="section-label">PRESET PACKS</div>`;
  HABIT_TEMPLATES.forEach(pack=>{
    const isExpanded=expandedPack===pack.id;
    html+=`<div class="card" style="padding:14px;">
      <div style="display:flex;justify-content:space-between;align-items:center;cursor:pointer;" onclick="expandedPack='${isExpanded?'':pack.id}';renderTemplates()">
        <div style="display:flex;align-items:center;gap:12px;">
          <div style="font-size:28px;">${pack.emoji}</div>
          <div>
            <div style="font-size:15px;font-weight:800;color:var(--text);">${esc(pack.name)}</div>
            <div style="font-size:11px;color:var(--text2);">${esc(pack.desc)}</div>
            <div style="font-size:10px;color:var(--text3);margin-top:2px;">${pack.habits.length} habits${state.importedPacks.includes(pack.id)?' · <span style="color:var(--green)">✓ Imported before</span>':''}</div>
          </div>
        </div>
        <span style="color:var(--text3);font-size:18px;">${isExpanded?'−':'+'}</span>
      </div>
      ${isExpanded?`
        <div style="border-top:1px solid var(--border);margin-top:12px;padding-top:10px;">
          ${pack.habits.map(h=>`<div class="template-habit-row">
            <div style="font-size:20px;">${h.emoji}</div>
            <div style="flex:1;"><div style="font-size:13px;font-weight:600;">${esc(h.name)}</div><div style="font-size:10px;color:var(--text3);">${h.area} · ${h.xp} XP</div></div>
          </div>`).join('')}
          <button class="btn btn-gold btn-full" style="margin-top:12px;" onclick="importTemplatePack(${JSON.stringify(pack).replace(/"/g,'&quot;')})">Add All Habits</button>
        </div>
      `:''}
    </div>`;
  });

  html+=`<div style="padding:0 16px 12px;">
    <button class="btn btn-ghost btn-full" onclick="saveCurrentHabitsAsTemplate()">💾 Save My Habits as Template</button>
  </div><div style="height:16px;"></div>`;
  el.innerHTML=html;
}

function importTemplatePack(packData){
  const pack=typeof packData==='string'?JSON.parse(packData.replace(/&quot;/g,'"')):packData;
  const existingNames=state.habits.map(h=>h.name.toLowerCase());
  let added=0,skipped=0;
  (pack.habits||[]).forEach(h=>{
    if(existingNames.includes(h.name.toLowerCase())){skipped++;return;}
    state.habits.push({id:uid(),emoji:h.emoji,name:h.name,area:h.area||'all-day',xp:h.xp||20,tags:[],scheduleDays:[0,1,2,3,4,5,6],archived:false});
    existingNames.push(h.name.toLowerCase());added++;
  });
  // First-time import XP
  if(pack.id&&!state.importedPacks.includes(pack.id)){
    state.importedPacks.push(pack.id);addXP(25);showToast(`✓ ${added} habits added from ${pack.name} · +25 XP`,'gold');
  } else {
    showToast(`✓ ${added} habits added${skipped?` · ${skipped} skipped (already exist)`:''}`,added?'green':'');
  }
  if(skipped&&added) showToast(`${skipped} habits skipped (already exist)`,'');
  save();renderTemplates();
}

function saveCurrentHabitsAsTemplate(){
  const name=prompt('Name for this template:');
  if(!name) return;
  const tpl={name,habits:state.habits.filter(h=>!h.archived).map(h=>({emoji:h.emoji,name:h.name,area:h.area,xp:h.xp}))};
  if(!state.userTemplates) state.userTemplates=[];
  state.userTemplates.push(tpl);save();renderTemplates();
  showToast('Template saved!','green');
}

function deleteUserTemplate(idx){
  if(!confirm('Delete this template?')) return;
  state.userTemplates.splice(idx,1);save();renderTemplates();
}

// FEATURE 10: SLEEP QUALITY REPORT + BADGE CHECK
// ═══════════════════════════════════════════════════════════════════════════════
function sleepReminderChip(){
  const h=new Date().getHours();
  if(h>=12) return '';
  const j=state.reflections[today()]||{};
  if(j.morning?.sleepQuality) return '';
  return `<div style="padding:0 16px 6px;"><div class="chip" onclick="journalTab='morning';goScreen('journal')" style="font-size:11px;">💤 Log your sleep quality →</div></div>`;
}

function sleepReportHtml(){
  const squares=[];
  let sleepSum=0,sleepCount=0;
  for(let i=29;i>=0;i--){
    const ds=addDays(today(),-i);
    const sq=state.reflections[ds]?.morning?.sleepQuality;
    const col=sq===3?'var(--green)':sq===2?'var(--amber)':sq===1?'var(--red)':'var(--bg3)';
    squares.push(`<div class="sleep-square" style="background:${col};"></div>`);
    if(sq){sleepSum+=sq;sleepCount++;}
  }
  const avgSleep=sleepCount?(sleepSum/sleepCount).toFixed(1):null;
  const sleepLabel=avgSleep>=2.5?'✨ Great':avgSleep>=1.5?'😐 Okay':'😴 Poor';

  // Correlation
  let insightText='Log sleep quality for 7+ days to unlock insights';
  if(sleepCount>=7){
    const greatDays=[];
    const notGreatDays=[];
    for(let i=1;i<=30;i++){
      const prev=addDays(today(),-i);
      const curr=addDays(today(),-i+1);
      const sq=state.reflections[prev]?.morning?.sleepQuality;
      if(!sq) continue;
      const log=state.dayLog[curr]||{};
      const hs=activeHabitsForDate(curr);
      const pct=hs.length?hs.filter(h=>log[h.id]==='done').length/hs.length:null;
      if(pct===null) continue;
      if(sq===3) greatDays.push(pct); else notGreatDays.push(pct);
    }
    if(greatDays.length>=3&&notGreatDays.length>=3){
      const avgG=greatDays.reduce((a,b)=>a+b,0)/greatDays.length;
      const avgN=notGreatDays.reduce((a,b)=>a+b,0)/notGreatDays.length;
      const diff=Math.round((avgG-avgN)*100);
      insightText=diff>0?`You complete ${diff}% more habits after a great night's sleep`:`Sleep quality doesn't clearly affect your habits yet`;
    }
  }

  return `<div class="section-label">SLEEP & RECOVERY</div>
  <div class="card" style="padding:14px;">
    <div style="font-size:10px;font-weight:700;letter-spacing:1px;color:var(--text3);margin-bottom:8px;">LAST 30 DAYS</div>
    <div style="display:flex;flex-wrap:wrap;gap:3px;margin-bottom:10px;">${squares.join('')}</div>
    <div style="display:flex;gap:10px;font-size:10px;color:var(--text2);margin-bottom:8px;"><span style="color:var(--green);">■ Great</span><span style="color:var(--amber);">■ Okay</span><span style="color:var(--red);">■ Poor</span></div>
    ${avgSleep?`<div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:8px;">Average sleep: ${sleepLabel} (${avgSleep}/3)</div>`:''}
    <div style="font-size:12px;color:var(--text2);">${insightText}</div>
  </div>`;
}

function checkSleepBadge(){
  let streak=0;
  for(let i=0;i<7;i++){
    const ds=addDays(today(),-i);
    if(state.reflections[ds]?.morning?.sleepQuality) streak++;
    else break;
  }
  if(streak>=7&&!state.badges['sleep_7']){
    state.badges['sleep_7']=today();
    if(!state.badgeXpAwarded['sleep_7']){
      state.badgeXpAwarded['sleep_7']=true;addXP(75);
      showToast('😴 Badge: Rest Master! +75 XP','gold');launchConfetti(40);
    }
    save();
  }
}
